// Render <select> giọng TTS — group theo ngôn ngữ, ưu tiên VI lên đầu.
// Nếu chưa nạp được voices (cold boot iOS), hiện disabled placeholder.
function renderVoiceSelect(currentName) {
  const voices = (_tts && _tts._voicesCache) || window.speechSynthesis.getVoices() || [];
  if (!voices.length) {
    return '<select class="voice-select" disabled><option>Đang nạp giọng đọc… (đóng/mở lại Cài đặt sau vài giây)</option></select>';
  }
  // Group by lang
  const groups = new Map();
  voices.forEach(v => {
    const key = (v.lang || 'other').toLowerCase();
    if (!groups.has(key)) groups.set(key, []);
    groups.get(key).push(v);
  });
  // Sort: vi-* → en-* → others (theo lang code)
  const sortedKeys = [...groups.keys()].sort((a, b) => {
    const score = (k) => /^vi/i.test(k) ? 0 : /^en/i.test(k) ? 1 : 2;
    return score(a) - score(b) || a.localeCompare(b);
  });
  const sel = currentName;
  let html = '<select class="voice-select" onchange="updateSetting(\'ttsVoice\', this.value); _tts.applyRateLive();">';
  html += '<option value="" ' + (!sel ? 'selected' : '') + '>Tự động (ưu tiên giọng tiếng Việt)</option>';
  for (const k of sortedKeys) {
    const list = groups.get(k);
    html += '<optgroup label="' + escapeHtml(k) + '">';
    for (const v of list) {
      const lbl = escapeHtml(v.name) + (v.localService ? '' : ' (cloud)');
      html += '<option value="' + escapeHtml(v.name) + '" ' + (sel === v.name ? 'selected' : '') + '>' + lbl + '</option>';
    }
    html += '</optgroup>';
  }
  html += '</select>';
  return html;
}

function toggleSettings() {
  let panel = document.getElementById('settings-panel');
  let backdrop = document.getElementById('settings-backdrop');
  if (!panel) {
    document.getElementById('overlay').innerHTML = renderSettingsPanel();
    panel = document.getElementById('settings-panel');
    backdrop = document.getElementById('settings-backdrop');
    requestAnimationFrame(() => {
      panel.classList.add('open');
      backdrop.classList.add('open');
    });
  } else {
    panel.classList.toggle('open');
    backdrop.classList.toggle('open');
    if (!panel.classList.contains('open')) {
      setTimeout(() => {
        document.getElementById('overlay').innerHTML = '';
      }, 250);
    }
  }
}

function updateSetting(key, value) {
  state.settings[key] = value;
  saveSettings();
  // Refresh panel UI
  const panel = document.getElementById('settings-panel');
  const wasOpen = panel && panel.classList.contains('open');
  if (wasOpen) {
    document.getElementById('overlay').innerHTML = renderSettingsPanel();
    document.getElementById('settings-panel').classList.add('open');
    document.getElementById('settings-backdrop').classList.add('open');
  }
}

// ========== CHAPTER PICKER — overlay chọn chương ngay trong reader ==========
// Cho phép nhảy thẳng tới bất kỳ chương nào, có ô tìm theo số/tên,
// không cần thoát ra trang chi tiết.
function renderChapterPicker(s) {
  const reading = getReadingState(s.slug);
  const readSet = new Set((reading && reading.read) || []);
  const curUrl = (state.chapter && state.chapter.url) || (reading && reading.chapterUrl) || '';
  return `
    <div class="picker-backdrop" id="picker-backdrop" onclick="closeChapterPicker()"></div>
    <div class="picker-panel" id="picker-panel" role="dialog" aria-label="Chọn chương">
      <div class="panel-handle" onclick="closeChapterPicker()"></div>
      <div class="picker-header">
        <div class="picker-title">${escapeHtml(s.title || 'Chọn chương')}</div>
        <div class="picker-count">${s.chapters.length} chương</div>
      </div>
      <div class="picker-search">
        ${icon.search}
        <input id="picker-input" type="text" autocomplete="off"
               placeholder="Tìm theo số hoặc tên chương…"
               oninput="filterChapterPicker(this.value)">
      </div>
      <div class="picker-list" id="picker-list">
        ${s.chapters.map((ch, idx) => {
          const isRead = readSet.has(ch.url);
          const isCurrent = ch.url === curUrl;
          const cls = ['picker-item'];
          if (isRead) cls.push('read');
          if (isCurrent) cls.push('current');
          // data-search gộp số thứ tự + tiêu đề (lowercase) để lọc nhanh,
          // bỏ dấu giúp người dùng gõ không dấu vẫn ra.
          const haystack = ((idx + 1) + ' ' + (ch.title || '')).toLowerCase();
          return `<a class="${cls.join(' ')}" data-search="${escapeHtml(haystack)}"
              onclick='pickChapter(${jsAttr(ch.url)})'>
            <span class="picker-num">#${idx + 1}</span>
            <span class="picker-name">${escapeHtml(ch.title)}</span>
          </a>`;
        }).join('')}
        <div class="picker-empty" id="picker-empty" style="display:none">Không tìm thấy chương nào khớp.</div>
      </div>
    </div>
  `;
}

function openChapterPicker() {
  const s = state.story;
  // Đảm bảo danh sách chương khớp với chương đang đọc — tránh trường hợp
  // state.story là tàn dư từ truyện trước (vd: mở từ "Đọc gần đây" sau khi
  // duyệt một truyện khác).
  const mismatch = state.chapter && s && s.slug && state.chapter.slug && s.slug !== state.chapter.slug;
  if (!s || !s.chapters || !s.chapters.length || mismatch) {
    // Chưa có (đúng) danh sách chương → quay về trang chi tiết để tải lại.
    // Tự nhiên hơn là chặn người dùng.
    backToStory();
    return;
  }
  // Overwrite overlay trực tiếp — nếu settings đang mở thì cũng bị thay bằng picker.
  // KHÔNG gọi toggleSettings() ở đây: nó schedule setTimeout 250ms để xoá overlay,
  // sẽ xoá luôn picker vừa render → picker biến mất sau ¼ giây.
  document.getElementById('overlay').innerHTML = renderChapterPicker(s);
  requestAnimationFrame(() => {
    const panel = document.getElementById('picker-panel');
    const backdrop = document.getElementById('picker-backdrop');
    if (panel) panel.classList.add('open');
    if (backdrop) backdrop.classList.add('open');
    // Tự cuộn tới chương đang đọc
    const cur = document.querySelector('.picker-item.current');
    if (cur) cur.scrollIntoView({ block: 'center', behavior: 'auto' });
    // Focus ô tìm sau hiệu ứng (tránh bàn phím mobile bật quá sớm gây lệch layout)
    setTimeout(() => {
      const input = document.getElementById('picker-input');
      if (input && window.innerWidth >= 640) input.focus();
    }, 280);
  });
}

function closeChapterPicker() {
  const panel = document.getElementById('picker-panel');
  const backdrop = document.getElementById('picker-backdrop');
  if (!panel) return;
  panel.classList.remove('open');
  if (backdrop) backdrop.classList.remove('open');
  setTimeout(() => {
    const ov = document.getElementById('overlay');
    if (ov) ov.innerHTML = '';
  }, 250);
}

function pickChapter(url) {
  closeChapterPicker();
  // Chờ animation đóng rồi mở chương — UX mượt hơn
  const ctx = state.story ? {
    title: state.story.title, slug: state.story.slug,
    url: state.story.url, cover: state.story.cover,
  } : null;
  setTimeout(() => openChapter(url, ctx), 60);
}

// Lọc danh sách: gõ "100" → chỉ hiện chương có số 100; gõ tên → khớp tiêu đề.
// Bỏ dấu tiếng Việt 2 bên để gõ không dấu vẫn ra (vd: "khai thien" khớp "Khải Thiên").
// Dùng ̀-ͯ thay vì ký tự kết hợp literal cho rõ ràng.
function _stripDiacritics(s) {
  return String(s || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase();
}
function filterChapterPicker(q) {
  q = _stripDiacritics(q).trim();
  const items = document.querySelectorAll('.picker-item');
  let shown = 0;
  for (const it of items) {
    const hay = _stripDiacritics(it.getAttribute('data-search') || '');
    const match = !q || hay.includes(q);
    it.style.display = match ? '' : 'none';
    if (match) shown++;
  }
  const empty = document.getElementById('picker-empty');
  if (empty) empty.style.display = shown ? 'none' : '';
}

// ========== ROUTING / HANDLERS ==========
function handleSearch(q) {
  q = (q || '').trim();
  if (!q) return;
  doSearch(q);
}

function handleBack() {
  if (state.view === 'reader') {
    backToStory();
  } else if (state.view === 'detail') {
    if (state.searchResults.length) {
      state.view = 'search';
      render();
    } else {
      goHome();
    }
  } else if (state.view === 'search') {
    goHome();
  }
}

// Keyboard shortcuts (reader)
document.addEventListener('keydown', (e) => {
  // Esc: đóng picker/settings ở bất kỳ view nào — không lệ thuộc trạng thái reader
  if (e.key === 'Escape') {
    if (document.getElementById('picker-panel')) { closeChapterPicker(); return; }
    const settings = document.getElementById('settings-panel');
    if (settings && settings.classList.contains('open')) { toggleSettings(); return; }
  }
  if (state.view !== 'reader' || !state.chapter) return;
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  // Đang mở picker thì arrow trái/phải dành cho input, không nhảy chương
  if (document.getElementById('picker-panel')) return;
  if (e.key === 'ArrowLeft' && state.chapter.prevUrl) openChapter(state.chapter.prevUrl);
  if (e.key === 'ArrowRight' && state.chapter.nextUrl) openChapter(state.chapter.nextUrl);
});

// ========== CHAPTER CACHE (localStorage, LRU) ==========
const CHAPTER_CACHE_KEY = 'kn_chapter_';
const CHAPTER_KEYS_KEY = 'kn_chapter_keys';
const CHAPTER_CACHE_MAX = 20;

function _chapterCacheKey(url) {
  // FNV-1a 32-bit hash → ~7 char base36. Collision-resistant for our 20-entry cache.
  // (Previous btoa(url).slice(0,24) collided for chapters in same story because
  //  the base64 prefix was identical — caused wrong chapter served from cache.)
  let h = 2166136261;
  for (let i = 0; i < url.length; i++) {
    h ^= url.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return CHAPTER_CACHE_KEY + (h >>> 0).toString(36);
}
function _readKeys() {
  try { return JSON.parse(localStorage.getItem(CHAPTER_KEYS_KEY) || '[]'); }
  catch { return []; }
}
function _writeKeys(arr) {
  try { localStorage.setItem(CHAPTER_KEYS_KEY, JSON.stringify(arr)); } catch {}
}

function loadChapterCache(url) {
  const key = _chapterCacheKey(url);
  try {
    const raw = localStorage.getItem(key);
    if (!raw) return null;
    const obj = JSON.parse(raw);
    if (!obj || !obj.data) return null;
    // URL verification — guard against rare hash collisions
    if (obj.url && obj.url !== url) return null;
    return obj.data;
  } catch { return null; }
}

function saveChapterCache(url, data) {
  const key = _chapterCacheKey(url);
  // Cache only minimal fields (omit non-serializable / not needed)
  const payload = {
    title: data.title, html: data.html,
    prevUrl: data.prevUrl, nextUrl: data.nextUrl,
    url: data.url, storyUrl: data.storyUrl,
    storyTitle: data.storyTitle, slug: data.slug,
  };
  let keys = _readKeys();
  if (!keys.includes(key)) {
    while (keys.length >= CHAPTER_CACHE_MAX) {
      const oldest = keys.shift();
      try { localStorage.removeItem(oldest); } catch {}
    }
    keys.push(key);
    _writeKeys(keys);
  } else {
    // Move to end (most recently used)
    keys = keys.filter(k => k !== key);
    keys.push(key);
    _writeKeys(keys);
  }
  try {
    localStorage.setItem(key, JSON.stringify({ url, data: payload, ts: Date.now() }));
  } catch (e) {
    // Quota exceeded — purge oldest 5 and retry once
    clearOldChapterCache(5);
    try { localStorage.setItem(key, JSON.stringify({ url, data: payload, ts: Date.now() })); } catch {}
  }
}

function clearOldChapterCache(n = 5) {
  const keys = _readKeys();
  const toRemove = keys.splice(0, n);
  toRemove.forEach(k => { try { localStorage.removeItem(k); } catch {} });
  _writeKeys(keys);
}

function checkStorage() {
  try {
    let total = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k || !k.startsWith('kn_')) continue;
      const v = localStorage.getItem(k) || '';
      total += k.length + v.length;
    }
    if (total > 4 * 1024 * 1024) clearOldChapterCache(5);
  } catch {}
}

// ========== IndexedDB chapter store (L2 — persistent, full offline) ==========
// L1 (localStorage LRU above) is sync hot cache (~20 chapters).
// L2 (IndexedDB here) is unlimited persistent store — once a chapter is fetched
// it's readable forever without network.
const IDB_NAME = 'kn-store';
const IDB_VERSION = 1;
const IDB_CHAPTER_STORE = 'chapters';
let _dbPromise = null;

function _openIDB() {
  if (_dbPromise) return _dbPromise;
  _dbPromise = new Promise((resolve, reject) => {
    if (typeof indexedDB === 'undefined') return reject(new Error('No IndexedDB'));
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_CHAPTER_STORE)) {
        const store = db.createObjectStore(IDB_CHAPTER_STORE, { keyPath: 'url' });
        store.createIndex('slug', 'slug', { unique: false });
        store.createIndex('ts', 'ts', { unique: false });
      }
    };
    req.onsuccess = () => resolve(req.result);
    req.onerror = () => reject(req.error);
  }).catch((e) => { _dbPromise = null; throw e; });
  return _dbPromise;
}

async function idbGetChapter(url) {
  try {
    const db = await _openIDB();
    return await new Promise((resolve) => {
      const tx = db.transaction(IDB_CHAPTER_STORE, 'readonly');
      const req = tx.objectStore(IDB_CHAPTER_STORE).get(url);
      req.onsuccess = () => resolve(req.result && req.result.data ? req.result.data : null);
      req.onerror = () => resolve(null);
    });
  } catch { return null; }
}

async function idbPutChapter(url, data) {
  try {
    const db = await _openIDB();
    const payload = {
      url,
      slug: data.slug || '',
      ts: Date.now(),
      data: {
        title: data.title, html: data.html,
        prevUrl: data.prevUrl, nextUrl: data.nextUrl,
        url: data.url, storyUrl: data.storyUrl,
        storyTitle: data.storyTitle, slug: data.slug,
      },
    };
    return await new Promise((resolve) => {
      const tx = db.transaction(IDB_CHAPTER_STORE, 'readwrite');
      tx.objectStore(IDB_CHAPTER_STORE).put(payload);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => resolve(false);
      tx.onabort = () => resolve(false);
    });
  } catch { return false; }
}

async function idbHasChapter(url) {
  try {
    const db = await _openIDB();
    return await new Promise((resolve) => {
      const tx = db.transaction(IDB_CHAPTER_STORE, 'readonly');
      const req = tx.objectStore(IDB_CHAPTER_STORE).count(url);
      req.onsuccess = () => resolve(req.result > 0);
      req.onerror = () => resolve(false);
    });
  } catch { return false; }
}

async function idbCountBySlug(slug) {
  try {
    const db = await _openIDB();
    return await new Promise((resolve) => {
      const tx = db.transaction(IDB_CHAPTER_STORE, 'readonly');
      const req = tx.objectStore(IDB_CHAPTER_STORE).index('slug').count(slug);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => resolve(0);
    });
  } catch { return 0; }
}

async function idbStorageEstimate() {
  try {
    if (navigator.storage && navigator.storage.estimate) {
      const e = await navigator.storage.estimate();
      return { usage: e.usage || 0, quota: e.quota || 0 };
    }
  } catch {}
  return null;
}

// ========== PREFETCH — TẢI TRƯỚC CHƯƠNG VÀO INDEXEDDB ==========
// Mục tiêu: khi đang đọc, ngầm tải trước ~20 chương kế tiếp vào IndexedDB (L2).
// Lần đọc sau chỉ việc lấy dữ liệu từ máy — không cần mạng, không cần proxy.
// Hoàn toàn cục bộ: không cần Google Drive, không cần đăng nhập, không cần API key.
const PREFETCH_COUNT = 20;        // kích thước cửa sổ tải trước (luôn giữ sẵn N chương phía trước)
const PREFETCH_CONCURRENCY = 4;   // số request song song (qua mapLimit)
let _prefetchBusy = false;        // chặn double-click nút "Tải trước"
// Cửa sổ trượt: chỉ số chương xa nhất đã được tải trước cho truyện đang đọc.
// Nhờ vậy, đọc tiến 1 chương chỉ cần tải đúng 1 chương mới lọt vào cuối cửa sổ.
let _prefetchFrontier = { slug: '', index: -1 };

// Tải 1 chương vào IndexedDB nếu chưa có. Best-effort: không bao giờ ném lỗi ra UI.
// Trả về: 'cached' (đã có) | 'fetched' (vừa tải) | 'fail'.
async function prefetchOne(url) {
  if (!url) return 'fail';
  try {
    if (loadChapterCache(url)) return 'cached';      // đã có trong L1
    if (await idbHasChapter(url)) return 'cached';   // đã có trong L2
    const doc = await fetchPage(url);
    const ch = parseChapter(doc, url);               // có thể ném SiteStructureError
    await idbPutChapter(url, ch);                    // chỉ ghi L2, không đụng L1 LRU
    return 'fetched';
  } catch (e) {
    console.warn('[prefetch] bỏ qua', url, '—', e.message);
    return 'fail';
  }
}

// Tải trước một danh sách URL chương, song song có giới hạn.
// progressCb(done, total) tuỳ chọn — dùng cho nút bấm thủ công.
// Tự ngắt nếu mạng/proxy hỏng liên tục (circuit breaker).
// Trả về tóm tắt { total, ok, fail } để bên gọi báo kết quả chính xác.
async function prefetchChapters(urls, progressCb) {
  urls = (urls || []).filter(Boolean);
  const total = urls.length;
  if (!total) { if (progressCb) progressCb(0, 0); return { total: 0, ok: 0, fail: 0 }; }
  let done = 0, ok = 0, fail = 0, consecFails = 0;
  if (progressCb) progressCb(0, total);
  await mapLimit(urls, PREFETCH_CONCURRENCY, async (url) => {
    if (consecFails >= 4) return;                    // mạng/proxy hỏng liên tục → ngừng cố
    const r = await prefetchOne(url);
    if (r === 'fail') { fail++; consecFails++; }
    else { ok++; consecFails = 0; }                  // 'fetched' hoặc 'cached' đều coi là có
    done++;
    if (progressCb) progressCb(done, total);
  });
  return { total, ok, fail };
}

// Khi không có danh sách chương (vd: đọc tiếp từ màn hình chính) → đi theo chuỗi nextUrl.
async function prefetchChainSilently(startUrl, count) {
  let url = startUrl, n = 0, fails = 0;
  while (url && n < count && fails < 4) {
    const r = await prefetchOne(url);
    fails = (r === 'fail') ? fails + 1 : 0;
    n++;
    const ch = loadChapterCache(url) || await idbGetChapter(url);
    url = ch && ch.nextUrl;
  }
}

// Lấy danh sách URL của tối đa `count` chương ngay SAU `currentUrl`,
// dựa vào danh sách chương của truyện đang mở (state.story.chapters).
// Trả về null nếu chưa mở truyện, hoặc chương không nằm trong danh sách.
function chapterUrlsAfter(currentUrl, count) {
  const list = state.story && state.story.chapters;
  if (!list || !list.length) return null;
  const idx = list.findIndex(c => c.url === currentUrl);
  if (idx === -1) return null;
  return list.slice(idx + 1, idx + 1 + count).map(c => c.url);
}

// AUTO-PREFETCH (cửa sổ trượt): gọi sau khi mở 1 chương thành công. Chạy ngầm, không chặn UI.
// Luôn giữ sẵn PREFETCH_COUNT chương phía trước. Đọc tiến 1 chương → cửa sổ trượt theo
// và chỉ tải đúng phần mới (thường là 1 chương) lọt vào cuối cửa sổ.
function schedulePrefetchAfter(currentUrl) {
  setTimeout(() => {
    const list = state.story && state.story.chapters;

    // Có danh sách chương → cửa sổ trượt theo chỉ số (chính xác & tiết kiệm nhất).
    if (list && list.length) {
      const slug = state.story.slug;
      const idx = list.findIndex(c => c.url === currentUrl);
      if (idx === -1) return;                        // chương không nằm trong danh sách

      const windowUrls = chapterUrlsAfter(currentUrl, PREFETCH_COUNT) || [];
      const desired = idx + windowUrls.length;       // chỉ số chương xa nhất trong cửa sổ
      const sameStory = _prefetchFrontier.slug === slug;

      // Cùng truyện & frontier còn ở phía trước → bỏ phần đã tải, chỉ tải phần mới.
      // Ngược lại (truyện mới / đã đọc vượt frontier / nhảy chương) → tải lại cả cửa sổ.
      const skip = (sameStory && _prefetchFrontier.index >= idx)
        ? _prefetchFrontier.index - idx
        : 0;
      const urls = windowUrls.slice(skip);

      if (urls.length) {
        _prefetchFrontier = { slug, index: desired };  // dời mốc cửa sổ
        prefetchChapters(urls);                        // tải song song phần thiếu
      } else if (!sameStory || desired > _prefetchFrontier.index) {
        _prefetchFrontier = { slug, index: desired };  // cửa sổ đã đầy, chỉ cập nhật mốc
      }
      return;
    }

    // Không có danh sách (đọc tiếp từ màn hình chính) → fallback đi theo chuỗi nextUrl.
    if (state.chapter && state.chapter.url === currentUrl && state.chapter.nextUrl) {
      prefetchChainSilently(state.chapter.nextUrl, PREFETCH_COUNT);
    }
  }, 800);  // chờ chương hiện tại render/scroll xong rồi mới tải ngầm
}

// MANUAL: nút "Tải trước N chương" ở trang chi tiết truyện.
// Bắt đầu từ chương đang đọc dở (nếu có), nếu chưa đọc thì từ chương đầu.
async function prefetchFromDetail() {
  if (_prefetchBusy) return;
  const s = state.story;
  if (!s || !s.chapters.length) return;

  let startIdx = 0;
  const reading = getReadingState(s.slug);
  if (reading && reading.chapterUrl) {
    const i = s.chapters.findIndex(c => c.url === reading.chapterUrl);
    if (i !== -1) startIdx = i;
  }
  const urls = s.chapters.slice(startIdx, startIdx + PREFETCH_COUNT).map(c => c.url);

  _prefetchBusy = true;
  const btn0 = document.getElementById('prefetch-btn');
  if (btn0) { btn0.disabled = true; btn0.classList.remove('done'); }
  const res = await prefetchChapters(urls, (done, total) => {
    const b = document.getElementById('prefetch-btn');
    if (b) b.textContent = `⏳ Đang tải… ${done}/${total}`;
  });
  // Đồng bộ mốc cửa sổ trượt: auto-prefetch khi đọc sẽ tiếp nối, không tải lại phần này.
  _prefetchFrontier = { slug: s.slug, index: Math.min(startIdx + PREFETCH_COUNT - 1, s.chapters.length - 1) };
  // Đặt nhãn cuối cùng dứt khoát — kể cả khi circuit breaker ngắt giữa chừng
  // (lúc đó progressCb không bao giờ chạm tới total).
  const btn1 = document.getElementById('prefetch-btn');
  if (btn1) {
    btn1.disabled = false;
    btn1.classList.add('done');
    btn1.textContent = res.fail
      ? `✓ Đã lưu ${res.ok}/${res.total} chương`
      : `✓ Đã lưu ${res.ok} chương`;
  }
  _prefetchBusy = false;
}

// ========== READING PROGRESS + HISTORY ==========
const READING_KEY_PREFIX = 'kn_reading_';
const HISTORY_KEY = 'kn_history';
const HISTORY_MAX = 10;

function loadReadingProgress(slug) {
  if (!slug) return null;
  try { return JSON.parse(localStorage.getItem(READING_KEY_PREFIX + slug) || 'null'); }
  catch { return null; }
}

function saveReadingProgress(slug, data) {
  if (!slug) return;
  const prev = loadReadingProgress(slug) || {};
  const merged = {
    ...prev,
    ...data,
    slug,
    updatedAt: Date.now(),
  };
  // Reset scrollY when chapter changes (unless scrollY explicitly passed)
  if (data.chapterUrl && prev.chapterUrl && data.chapterUrl !== prev.chapterUrl
      && !('scrollY' in data)) {
    merged.scrollY = 0;
  }
  try { localStorage.setItem(READING_KEY_PREFIX + slug, JSON.stringify(merged)); } catch {}
  saveToHistory(merged);
}

function saveScrollPosition() {
  if (state.view !== 'reader' || !state.chapter) return;
  const slug = state.chapter.slug;
  if (!slug) return;
  const prev = loadReadingProgress(slug);
  if (!prev) return;
  // Only update scrollY field, don't push history
  try {
    localStorage.setItem(READING_KEY_PREFIX + slug, JSON.stringify({
      ...prev, scrollY: window.scrollY, updatedAt: Date.now(),
    }));
  } catch {}
}

function restoreScrollPosition() {
  if (state.view !== 'reader' || !state.chapter) return;
  const slug = state.chapter.slug;
  const data = loadReadingProgress(slug);
  if (!data || data.chapterUrl !== state.chapter.url) return;
  if (!data.scrollY) return;
  requestAnimationFrame(() => {
    requestAnimationFrame(() => {
      window.scrollTo({ top: data.scrollY, behavior: 'auto' });
    });
  });
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch { return []; }
}

function saveToHistory(data) {
  if (!data.slug) return;
  let history = loadHistory();
  history = history.filter(h => h.slug !== data.slug);
  history.unshift({
    slug: data.slug,
    title: data.storyTitle || slugToTitle(data.slug),
    cover: data.cover || '',
    chapterTitle: data.chapterTitle || '',
    chapterUrl: data.chapterUrl || '',
    storyUrl: data.storyUrl || '',
    updatedAt: data.updatedAt || Date.now(),
  });
  if (history.length > HISTORY_MAX) history = history.slice(0, HISTORY_MAX);
  try { localStorage.setItem(HISTORY_KEY, JSON.stringify(history)); } catch {}
}

function resumeReading(slug) {
  const data = loadReadingProgress(slug);
  if (data?.chapterUrl) {
    openChapter(data.chapterUrl, {
      title: data.storyTitle, slug,
      url: data.storyUrl, cover: data.cover,
    });
  } else if (data?.storyUrl) {
    openStory(data.storyUrl);
  }
}

// Auto-save scroll: interval + debounce
let _scrollStopTimer;
window.addEventListener('scroll', () => {
  clearTimeout(_scrollStopTimer);
  _scrollStopTimer = setTimeout(saveScrollPosition, 500);
}, { passive: true });
setInterval(saveScrollPosition, 2000);

// ========== Debounced search input ==========
let _searchTimer;
function handleSearchInput(q) {
  clearTimeout(_searchTimer);
  q = (q || '').trim();
  if (!q || q.length < 2) return;
  _searchTimer = setTimeout(() => handleSearch(q), 300);
}

// ========== UX helpers (description toggle) ==========
function toggleDesc(btn) {
  const desc = btn.previousElementSibling;
  if (!desc) return;
  const expanded = desc.classList.toggle('clamped') === false; // if class removed → expanded
  // .toggle returns the new presence; we removed clamped → false → expanded
  btn.textContent = expanded ? 'Thu gọn' : 'Xem thêm';
}

// ========== Swipe gesture: prev/next chapter + vuốt-lên-cuối-chương ==========
let _touchStartX = 0, _touchStartY = 0, _touchStartT = 0, _touchStartAtBottom = false;
function _pageAtBottom() {
  const doc = document.documentElement;
  return (window.scrollY + window.innerHeight) >= (doc.scrollHeight - 6);
}
document.addEventListener('touchstart', (e) => {
  const t = e.touches[0];
  _touchStartX = t.clientX;
  _touchStartY = t.clientY;
  _touchStartT = Date.now();
  _touchStartAtBottom = _pageAtBottom();   // đã ở đáy trang khi BẮT ĐẦU vuốt?
}, { passive: true });
document.addEventListener('touchend', (e) => {
  if (state.view !== 'reader' || !state.chapter) return;
  const tag = (e.target.tagName || '').toUpperCase();
  if (tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'BUTTON' || e.target.closest('.toolbar')) return;
  const t = e.changedTouches[0];
  const dx = t.clientX - _touchStartX;
  const dy = t.clientY - _touchStartY;
  const dt = Date.now() - _touchStartT;

  // 1) Vuốt NGANG: |dx| > 60, chủ yếu ngang, nhanh < 600ms → prev/next
  if (Math.abs(dx) >= 60 && Math.abs(dx) >= Math.abs(dy) * 1.5 && dt <= 600) {
    if (dx < 0 && state.chapter.nextUrl) openChapter(state.chapter.nextUrl);
    else if (dx > 0 && state.chapter.prevUrl) openChapter(state.chapter.prevUrl);
    return;
  }

  // 2) Vuốt LÊN ở CUỐI chương → chương sau.
  //    Điều kiện chặt để không nhầm với cuộn thường:
  //    - đã ở đáy trang lúc bắt đầu VÀ vẫn ở đáy lúc kết thúc (không cuộn được nữa)
  //    - dy < -80 (vuốt lên rõ), chủ yếu dọc, không quá chậm
  if (_touchStartAtBottom && _pageAtBottom() &&
      dy < -80 && Math.abs(dy) >= Math.abs(dx) * 1.5 && dt <= 800 &&
      state.chapter.nextUrl) {
    openChapter(state.chapter.nextUrl);
  }
}, { passive: true });

// ========== Scroll preservation per view + focus preservation ==========
// Wraps render() to:
// (1) Remember scroll position per view and restore on return.
// (2) Preserve input focus + cursor across re-renders (needed for debounced search).
// Does not modify state — only piggybacks on render() lifecycle.
(function () {
  const viewScrolls = { home: 0, search: 0, detail: 0, reader: 0 };
  let prevView = state.view;
  let restoring = false;
  const origRender = render;
  window.addEventListener('scroll', () => {
    if (restoring) return;
    viewScrolls[state.view] = window.scrollY;
  }, { passive: true });
  render = function () {
    const oldView = prevView;
    const newView = state.view;
    if (oldView && !restoring) viewScrolls[oldView] = window.scrollY;

    // Snapshot focused input (search bar) so we can restore after re-render
    const ae = document.activeElement;
    const isInput = ae && ae.tagName === 'INPUT' && ae.name;
    const focusSnap = isInput ? {
      name: ae.name,
      value: ae.value,
      selStart: ae.selectionStart,
      selEnd: ae.selectionEnd,
    } : null;

    restoring = true;
    origRender.apply(this, arguments);

    if (focusSnap) {
      const next = document.querySelector('input[name="' + focusSnap.name + '"]');
      if (next) {
        // Preserve user's in-progress typing — DON'T overwrite their current value
        // (state.query may be stale during a 500ms debounce window)
        if (focusSnap.value !== next.value) next.value = focusSnap.value;
        next.focus();
        try { next.setSelectionRange(focusSnap.selStart || 0, focusSnap.selEnd || 0); } catch {}
      }
    }

    if (newView !== oldView) {
      const target = viewScrolls[newView] || 0;
      requestAnimationFrame(() => {
        window.scrollTo({ top: target, behavior: 'auto' });
        requestAnimationFrame(() => { restoring = false; });
      });
    } else {
      restoring = false;
    }
    prevView = newView;
  };
})();

// ========== MAIN RENDER ==========
function render() {
  document.getElementById('header').innerHTML = renderHeader();
  const main = document.getElementById('main');
  if (state.view === 'home') main.innerHTML = renderHome();
  else if (state.view === 'search') main.innerHTML = renderSearch();
  else if (state.view === 'detail') main.innerHTML = renderStoryDetail();
  else if (state.view === 'reader') {
    main.innerHTML = renderReader();
    // Set page bg to match reader theme
    document.body.style.background = 'var(--reader-bg)';
    return;
  }
  document.body.style.background = 'var(--bg)';
}

// Boot
applySettings();
checkStorage();
render();

// Pre-load TTS voices lúc boot — tránh `await getVoices()` trong gesture handler (iOS lose user-gesture).
(function _ttsPreload() {
  if (!('speechSynthesis' in window)) return;
  const synth = window.speechSynthesis;
  const sync = synth.getVoices() || [];
  if (sync.length) _tts._voicesCache = sync;
  // Sự kiện voiceschanged firing trễ trên Chrome/Edge → update cache khi nó tới
  if ('onvoiceschanged' in synth) {
    synth.addEventListener('voiceschanged', () => {
      _tts._voicesCache = synth.getVoices() || [];
    });
  }
})();
</script>
</body>
</html>
