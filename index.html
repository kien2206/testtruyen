<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KIEN NE - Truyện Full Sạch</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f0f0f;
      color: #ddd;
      min-height: 100vh;
    }
    .header {
      background: #1a1a1a;
      padding: 15px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #333;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 26px; font-weight: bold; color: #ffd700; }
    .search {
      width: 550px;
      padding: 14px 20px;
      background: #222;
      border: 1px solid #444;
      border-radius: 999px;
      color: white;
      font-size: 16px;
    }
    .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
    h1 { text-align: center; margin: 40px 0 10px; color: #ffd700; font-size: 42px; }
    p { text-align: center; color: #aaa; margin-bottom: 30px; }
    
    .section { margin-bottom: 40px; }
    .section-title { font-size: 20px; margin-bottom: 15px; color: #ffd700; }
    
    .genres { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; }
    .genre-btn {
      background: #222; color: #ddd; padding: 10px 18px; border-radius: 999px;
      cursor: pointer; font-size: 15px;
    }
    .genre-btn:hover { background: #ffd700; color: black; }

    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 20px;
    }
    .book-card {
      background: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: 0.3s;
    }
    .book-card:hover { transform: scale(1.06); }
    .book-card img { width: 100%; height: 220px; object-fit: cover; }
    .book-info { padding: 12px; text-align: center; }

    .reader {
      background: #1a1a1a;
      padding: 30px;
      border-radius: 12px;
      margin-top: 40px;
    }
    .content { 
      font-size: 18px; 
      line-height: 1.9; 
      padding: 30px; 
      background: #111; 
      border-radius: 8px; 
      margin-top: 20px; 
    }
  </style>
</head>
<body>

    <div class="logo">KIEN NE</div>

  </div>

    <div class="section">

      <div class="genres">
        <div class="genre-btn" onclick="searchTruyen('Tiên Hiệp')">Tiên Hiệp</div>
        <div class="genre-btn" onclick="searchTruyen('Ngôn Tình')">Ngôn Tình</div>
        <div class="genre-btn" onclick="searchTruyen('Huyền Huyễn')">Huyền Huyễn</div>
        <div class="genre-btn" onclick="searchTruyen('Đô Thị')">Đô Thị</div>
        <div class="genre-btn" onclick="searchTruyen('Kiếm Hiệp')">Kiếm Hiệp</div>
        <div class="genre-btn" onclick="searchTruyen('Đam Mỹ')">Đam Mỹ</div>
      </div>
    </div>

    <div class="section">
      <div class="section-title">📖 Đọc gần đây</div>
      <div class="history-grid" id="history"></div>
    </div>

    <div class="reader">

      <button onclick="loadChapter()" style="padding:15px 30px; background:#ffd700; color:black; border:none; border-radius:8px; cursor:pointer;">📖 Đọc Chương</button>

      <div id="loading" style="display:none; margin:20px 0; color:#ffd700;">Đang tải...</div>
      <h2 id="title" style="margin:25px 0; text-align:center; color:#ffd700;"></h2>
      <div id="content" class="content"></div>
    </div>
  </div>
