<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KIEN NE - Truyện Sạch</title>
  <style>
    :root { --primary: #facc15; --bg: #0a0a0a; --card: #121212; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: #ddd;
      min-height: 100vh;
    }
    .header {
      position: sticky; top: 0; background: #111; padding: 14px 16px;
      display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; z-index: 100;
    }
    .logo { font-size: 26px; font-weight: 900; color: var(--primary); }
    .search { flex: 1; padding: 12px 20px; background: #222; border: 1px solid #444; border-radius: 50px; color: white; font-size: 16px; }
    
    .container { max-width: 1280px; margin: 0 auto; padding: 16px; }
    .section-title { color: var(--primary); margin: 24px 0 12px; font-size: 20px; }
    
    .genres { display: flex; flex-wrap: wrap; gap: 10px; }
    .genre-btn {
      background: #222; padding: 9px 18px; border-radius: 999px; font-size: 14.5px; cursor: pointer;
    }
    .genre-btn:hover { background: var(--primary); color: black; }

    .history-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
      gap: 16px;
    }
    .history-card {
      background: var(--card); border-radius: 12px; overflow: hidden; cursor: pointer;
    }
    .history-card img { width: 100%; height: 190px; object-fit: cover; }
    .history-info { padding: 10px; text-align: center; font-size: 14px; }

    .reader {
      background: var(--card); padding: 20px; border-radius: 16px; margin-top: 20px;
    }
    .input-group { display: flex; gap: 10px; margin-bottom: 16px; }
    .input-group input {
      flex: 1; padding: 15px; background: #222; border: 1px solid #444;
      border-radius: 12px; color: white; font-size: 16px;
    }
    button {
      padding: 15px 24px; background: var(--primary); color: black;
      border: none; border-radius: 12px; font-weight: 600; cursor: pointer;
    }
    .content {
      font-size: 18px; line-height: 1.9; padding: 30px; background: #0a0a0a;
      border-radius: 12px; min-height: 400px;
    }
    .loading { text-align: center; padding: 50px; color: var(--primary); font-size: 18px; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">KIEN NE</div>
    <input type="text" class="search" id="searchInput" placeholder="Tìm tên truyện...">
  </div>

  <div class="container">
    <div class="section-title">Thể loại phổ biến</div>
    <div class="genres" id="genres"></div>

    <div class="section-title">📖 Đọc gần đây</div>
    <div class="history-grid" id="historyGrid"></div>

    <div class="reader">
      <div class="input-group">
        <input type="text" id="chapterUrl" placeholder="Dán link chương Truyenfull.vision">
        <button onclick="loadChapter()">Đọc</button>
      </div>
      <div id="loading" class="loading" style="display:none">Đang tải...</div>
      <h2 id="title" style="margin:15px 0; color:var(--primary); text-align:center;"></h2>
      <div id="content" class="content"></div>
    </div>
  </div>

  <script>
    const CORS = "https://api.allorigins.win/get?url=";
    let currentUrl = "";

    // Genres
    ["Tiên Hiệp","Ngôn Tình","Huyền Huyễn","Đô Thị","Kiếm Hiệp","Đam Mỹ"].forEach(g => {
      const b = document.createElement('div');
      b.className = 'genre-btn';
      b.textContent = g;
      b.onclick = () => window.open(`https://truyenfull.vision/the-loai/${g.toLowerCase().replace(/ /g,'-')}/`, '_blank');
      document.getElementById('genres').appendChild(b);
    });

    // History
    let history = JSON.parse(localStorage.getItem('truyenHistory')) || [];
    function renderHistory() {
      const container = document.getElementById('historyGrid');
      container.innerHTML = '';
      history.forEach(item => {
        const div = document.createElement('div');
        div.className = 'history-card';
        div.innerHTML = `<img src="https://via.placeholder.com/300x400/1a1a1a/facc15?text=Truyện"><div class="history-info">${item.title}</div>`;
        div.onclick = () => { document.getElementById('chapterUrl').value = item.url; loadChapter(); };
        container.appendChild(div);
      });
    }

    async function loadChapter() {
      const url = document.getElementById('chapterUrl').value.trim();
      if (!url) return alert("Dán link chương vào!");

      currentUrl = url;
      document.getElementById('loading').style.display = 'block';
      document.getElementById('content').innerHTML = '';

      try {
        const res = await fetch(CORS + encodeURIComponent(url));
        const data = await res.json();
        const doc = new DOMParser().parseFromString(data.contents, 'text/html');

        const title = doc.querySelector('h1')?.textContent.trim() || "Chương Truyện";
        document.getElementById('title').textContent = title;

        let content = doc.querySelector('div.chapter-c') || doc.querySelector('div.reading-content') || 
                      doc.querySelector('div#chapter-content') || doc.querySelector('article');

        if (content) {
          content.querySelectorAll('script,style,ins,iframe,.ads,.qc,.banner').forEach(e => e.remove());
          document.getElementById('content').innerHTML = content.innerHTML;
          
          // Save history
          history.unshift({title, url});
          if (history.length > 12) history.pop();
          localStorage.setItem('truyenHistory', JSON.stringify(history));
          renderHistory();
        }
      } catch (e) {
        document.getElementById('content').innerHTML = `<p style="color:red;text-align:center;">Lỗi: ${e.message}</p>`;
      }
      document.getElementById('loading').style.display = 'none';
    }

    // Search
    document.getElementById('searchInput').addEventListener('keypress', e => {
      if (e.key === 'Enter') {
        const k = e.target.value.trim();
        if (k) window.open(`https://truyenfull.vision/tim-kiem/?tukhoa=${encodeURIComponent(k)}`, '_blank');
      }
    });

    document.getElementById('chapterUrl').addEventListener('keypress', e => {
      if (e.key === 'Enter') loadChapter();
    });

    renderHistory();
  </script>
</body>
</html>
