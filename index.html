<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIEN NE — Đọc truyện online</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;500;600;700&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0e0c;
    --bg-elev: #1a1815;
    --bg-elev-2: #25221d;
    --text: #e8e0d0;
    --text-muted: #9a9082;
    --text-dim: #6e655a;
    --accent: #c8965a;
    --accent-hover: #d9a76b;
    --border: #2c2823;
    --danger: #d97757;
    --reader-bg: #0f0e0c;
    --reader-text: #e8e0d0;
    --content-width: 720px;
    --reader-font-size: 18px;
    --reader-font-family: 'Crimson Pro', Georgia, serif;
  }

  * {
    box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Be Vietnam Pro', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    -webkit-overflow-scrolling: touch;
    scroll-behavior: smooth;
    overscroll-behavior-y: none;
  }
  body { touch-action: manipulation; }

  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; touch-action: manipulation; }
  input { font-family: inherit; }
  img { display: block; max-width: 100%; }

  /* Page transition (fires whenever direct children of #main are inserted) */
  #main > * { animation: fadeIn 0.25s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  /* Shimmer keyframe for skeleton */
  @keyframes shimmer {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }
  .shimmer {
    background: linear-gradient(90deg, var(--bg-elev-2) 0%, var(--bg-elev) 50%, var(--bg-elev-2) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s linear infinite;
  }

  /* Tap feedback for cards/chips/buttons */
  .result-card:active, .recent-card:active, .genre-chip:active,
  .chapter-item:active, .cta-btn:active, .show-more-btn:active {
    transform: scale(0.97);
  }

  /* GPU hints for elements that animate */
  .result-card, .recent-card, .chapter-item,
  .settings-panel, .settings-backdrop, .toolbar,
  .story-cta-bar {
    will-change: transform;
    transform: translateZ(0);
  }

  /* Honor user's reduced-motion preference */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
      scroll-behavior: auto !important;
    }
  }

  /* Header */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--header-bg, rgba(15, 14, 12, 0.92));
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .header-inner {
    max-width: 1100px;
    margin: 0 auto;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .logo {
    font-family: 'Crimson Pro', serif;
    font-weight: 700;
    font-size: 22px;
    letter-spacing: 1px;
    color: var(--accent);
    cursor: pointer;
    flex-shrink: 0;
  }
  .logo-dot { color: var(--text); }

  .back-btn {
    width: 36px; height: 36px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
    flex-shrink: 0;
  }
  .back-btn:hover { background: var(--bg-elev); }
  .back-btn svg { width: 20px; height: 20px; }

  .search-bar {
    flex: 1;
    display: flex;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0 12px;
    align-items: center;
    transition: border-color 0.15s;
  }
  .search-bar:focus-within { border-color: var(--accent); }
  .search-bar svg { width: 18px; height: 18px; color: var(--text-muted); flex-shrink: 0; }
  .search-bar input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    padding: 10px 10px;
    font-size: 14px;
  }
  .search-bar input::placeholder { color: var(--text-dim); }

  /* Main */
  .main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  /* Welcome */
  .welcome {
    text-align: center;
    padding: 60px 20px;
  }
  .welcome h1 {
    font-family: 'Crimson Pro', serif;
    font-size: 48px;
    font-weight: 600;
    margin-bottom: 12px;
    background: linear-gradient(135deg, var(--accent), #e3b87a);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .welcome p {
    color: var(--text-muted);
    font-size: 16px;
    max-width: 480px;
    margin: 0 auto 32px;
  }
  .welcome-hint {
    color: var(--text-dim);
    font-size: 13px;
    margin-top: 24px;
  }

  /* Search results */
  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }
  .result-card {
    display: flex;
    gap: 14px;
    padding: 14px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .result-card:hover {
    border-color: var(--accent);
    background: var(--bg-elev-2);
    transform: translateY(-2px);
  }
  .result-card img {
    width: 70px;
    height: 100px;
    object-fit: cover;
    border-radius: 6px;
    flex-shrink: 0;
    background: var(--bg-elev-2);
  }
  .result-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
  }
  .result-title {
    font-weight: 600;
    font-size: 15px;
    margin-bottom: 6px;
    line-height: 1.3;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .result-meta {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 4px;
  }
  .result-genre {
    font-size: 12px;
    color: var(--accent);
    margin-top: auto;
  }
  /* Badge nhỏ trên card kết quả để phân biệt nguồn (vd: truyenhoan vs truyenfull mặc định) */
  .result-source-badge {
    display: inline-block;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 999px;
    background: rgba(106,156,94,0.15);
    color: #6a9c5e;
    border: 1px solid rgba(106,156,94,0.35);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    font-weight: 600;
  }

  .section-title {
    font-family: 'Crimson Pro', serif;
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 18px;
    color: var(--text);
  }
  /* Indicator "đang tải nguồn khác" cạnh title — progressive search */
  .search-loading-hint {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'Be Vietnam Pro', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: var(--text-muted);
    margin-left: 12px;
    vertical-align: middle;
  }
  .search-spinner {
    width: 12px; height: 12px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: inline-block;
  }

  /* Story detail */
  .story-header {
    display: flex;
    gap: 28px;
    margin-bottom: 36px;
  }
  .story-cover {
    width: 220px;
    height: 310px;
    border-radius: 12px;
    object-fit: cover;
    flex-shrink: 0;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    background: var(--bg-elev);
  }
  .story-info { flex: 1; min-width: 0; }
  .story-title {
    font-family: 'Crimson Pro', serif;
    font-size: 34px;
    font-weight: 600;
    line-height: 1.15;
    margin-bottom: 14px;
  }
  .story-meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 20px;
    font-size: 14px;
    color: var(--text-muted);
    margin-bottom: 18px;
  }
  .story-meta-row b { color: var(--text); font-weight: 500; }
  .story-genres {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 18px;
  }
  .genre-tag {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--accent);
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
  }
  .story-desc {
    color: var(--text-muted);
    line-height: 1.7;
    font-size: 14px;
    max-height: 200px;
    overflow-y: auto;
    padding-right: 8px;
  }
  .story-desc::-webkit-scrollbar { width: 6px; }
  .story-desc::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .resume-btn {
    background: var(--accent);
    color: #1a1208;
    padding: 10px 20px;
    border-radius: 8px;
    font-weight: 600;
    font-size: 14px;
    margin-top: 14px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: background 0.15s;
  }
  .resume-btn:hover { background: var(--accent-hover); }

  /* Chapter list */
  .chapters-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .chapters-count { font-size: 13px; color: var(--text-muted); }
  /* Nút "Tải trước" — prefetch chương vào IndexedDB */
  .prefetch-btn {
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    transition: background 0.15s, border-color 0.15s, color 0.15s;
  }
  .prefetch-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--bg-elev-2); }
  .prefetch-btn:disabled { cursor: default; opacity: 0.85; }
  .prefetch-btn.done { color: #6a9c5e; border-color: rgba(106,156,94,0.4); }
  /* Form nhảy nhanh tới chương số N */
  .chapter-jump {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text-muted);
  }
  .chapter-jump input {
    width: 70px;
    background: var(--bg-elev-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 8px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    -moz-appearance: textfield;
  }
  .chapter-jump input::-webkit-outer-spin-button,
  .chapter-jump input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .chapter-jump input:focus { border-color: var(--accent); }
  .chapter-jump button {
    background: var(--accent);
    color: #1a1208;
    padding: 6px 12px;
    border-radius: 6px;
    font-weight: 600;
    font-size: 13px;
    transition: filter 0.12s;
  }
  .chapter-jump button:hover { filter: brightness(1.08); }
  .chapters-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 4px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 8px;
  }
  .chapter-item {
    display: block;
    padding: 10px 14px;
    border-radius: 6px;
    color: var(--text-muted);
    font-size: 14px;
    transition: all 0.12s;
    cursor: pointer;
    line-height: 1.4;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .chapter-item:hover { background: var(--bg-elev-2); color: var(--text); }
  .chapter-item.read { color: var(--text-dim); }
  .chapter-item.current { background: var(--bg-elev-2); color: var(--accent); }

  .pagination {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 6px;
    margin-top: 20px;
    flex-wrap: wrap;
  }
  .page-btn {
    min-width: 36px;
    height: 36px;
    padding: 0 10px;
    border-radius: 8px;
    background: var(--bg-elev);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 13px;
    transition: all 0.12s;
  }
  .page-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--text); }
  .page-btn.active { background: var(--accent); color: #1a1208; border-color: var(--accent); }
  .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Reader */
  .reader-container {
    background: var(--reader-bg);
    color: var(--reader-text);
    transition: background 0.2s, color 0.2s;
  }
  .reader-wrap {
    max-width: var(--content-width);
    margin: 0 auto;
    padding: 32px 24px 120px;
  }
  .reader-breadcrumb {
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 10px;
  }
  .reader-breadcrumb a:hover { color: var(--accent); text-decoration: underline; }
  .reader-title {
    font-family: var(--reader-font-family);
    font-size: calc(var(--reader-font-size) * 1.55);
    font-weight: 600;
    line-height: 1.25;
    margin-bottom: 30px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }
  .reader-content {
    font-family: var(--reader-font-family);
    font-size: var(--reader-font-size);
    line-height: 1.85;
    color: var(--reader-text);
  }
  .reader-content p { margin-bottom: 1.1em; }
  .reader-content img {
    margin: 12px auto;
    max-width: 100%;
    height: auto;
    border-radius: 6px;
  }
  .reader-content br + br { display: none; }

  /* Vùng cuối chương — vuốt lên / chạm để sang chương sau */
  .chapter-end {
    margin-top: 40px;
    padding: 24px 16px;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    border-top: 1px dashed var(--border);
    user-select: none;
  }
  .chapter-end.has-next {
    cursor: pointer;
    color: var(--text-muted);
    transition: color 0.15s;
  }
  .chapter-end.has-next:hover { color: var(--accent); }
  .chapter-end.has-next:active { color: var(--accent); }
  .chapter-end .ce-arrow {
    display: block;
    font-size: 22px;
    line-height: 1;
    margin-bottom: 6px;
    animation: ceBob 1.6s ease-in-out infinite;
  }
  @keyframes ceBob {
    0%, 100% { transform: translateY(0); opacity: 0.55; }
    50%      { transform: translateY(-5px); opacity: 1; }
  }
  .reader-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .nav-btn {
    background: var(--bg-elev);
    border: 1px solid var(--border);
    padding: 12px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    transition: all 0.12s;
    font-family: 'Be Vietnam Pro', sans-serif;
    display: inline-flex;
    align-items: center;
    gap: 8px;
  }
  .nav-btn:hover:not(:disabled) { border-color: var(--accent); background: var(--bg-elev-2); }
  .nav-btn:disabled { opacity: 0.35; cursor: not-allowed; }

  /* Floating toolbar */
  .toolbar {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg-elev);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 6px;
    display: flex;
    gap: 2px;
    z-index: 50;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
  }
  .toolbar button {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--text-muted);
    transition: all 0.12s;
  }
  .toolbar button:hover { background: var(--bg-elev-2); color: var(--accent); }
  .toolbar button:disabled { opacity: 0.3; cursor: not-allowed; }
  .toolbar svg { width: 20px; height: 20px; }
  /* Nút tốc độ TTS — text-only, hẹp hơn icon button */
  .toolbar button.tts-rate {
    width: auto;
    min-width: 44px;
    padding: 0 10px;
    font-size: 12px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.3px;
  }
  /* TTS button — sáng accent khi đang đọc/tạm dừng */
  .toolbar button.tts-active { background: var(--bg-elev-2); color: var(--accent); }
  .toolbar button.tts-active::after {
    content: '';
    position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%);
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--accent);
  }
  .toolbar button.tts-active { position: relative; }
  /* <select> giọng đọc trong Settings panel */
  .voice-select {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    appearance: none;
    background-image: linear-gradient(45deg, transparent 50%, var(--text-muted) 50%),
                      linear-gradient(135deg, var(--text-muted) 50%, transparent 50%);
    background-position: calc(100% - 16px) 50%, calc(100% - 10px) 50%;
    background-size: 6px 6px;
    background-repeat: no-repeat;
    padding-right: 30px;
  }
  .voice-select:focus { border-color: var(--accent); }
  .voice-select:disabled { opacity: 0.6; cursor: wait; }
  /* Đoạn văn đang được đọc to — viền trái accent + nhẹ background */
  .reader-content p.tts-highlight {
    background: rgba(200,150,90,0.08);
    box-shadow: inset 3px 0 0 var(--accent);
    border-radius: 0 4px 4px 0;
    padding-left: 12px;
    transition: background 0.3s, box-shadow 0.3s;
  }

  /* Settings panel */
  .settings-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 200;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .settings-backdrop.open { opacity: 1; pointer-events: auto; }
  .settings-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-elev);
    border-top: 1px solid var(--border);
    border-radius: 18px 18px 0 0;
    padding: 22px 22px 30px;
    z-index: 201;
    transform: translateY(100%);
    transition: transform 0.25s ease;
    max-height: 80vh;
    overflow-y: auto;
  }
  @media (min-width: 640px) {
    .settings-panel {
      max-width: 440px;
      left: 50%;
      bottom: 80px;
      transform: translate(-50%, calc(100% + 80px));
      border-radius: 16px;
      border: 1px solid var(--border);
    }
    .settings-panel.open { transform: translate(-50%, 0); }
  }
  .settings-panel.open { transform: translateY(0); }
  .settings-title {
    font-family: 'Crimson Pro', serif;
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 18px;
    color: var(--text);
  }
  .setting-group { margin-bottom: 22px; }
  .setting-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: var(--text-muted);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .setting-label span:last-child { color: var(--accent); font-weight: 600; }
  .setting-options {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .setting-options button {
    padding: 10px;
    border-radius: 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 13px;
    transition: all 0.12s;
  }
  .setting-options button:hover { border-color: var(--accent); }
  .setting-options button.active {
    background: var(--accent);
    color: #1a1208;
    border-color: var(--accent);
    font-weight: 600;
  }
  .theme-options { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
  .theme-swatch {
    aspect-ratio: 1;
    border-radius: 10px;
    border: 2px solid var(--border);
    cursor: pointer;
    transition: all 0.12s;
    position: relative;
    overflow: hidden;
  }
  .theme-swatch.active { border-color: var(--accent); }
  .theme-swatch span {
    position: absolute;
    bottom: 4px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 11px;
    font-weight: 500;
    text-shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  input[type="range"] {
    width: 100%;
    accent-color: var(--accent);
  }

  /* ============ CHAPTER PICKER (overlay chọn chương trong reader) ============ */

<script>
// ========== CONFIG ==========
const BASE = 'https://truyenfull.vision';
const TRUYENHOAN_BASE = 'https://truyenhoan.com';   // truyenfull clone — đọc full content trong app

// ➤ Cloudflare Worker proxy — dùng khi app host trên GitHub Pages.
// Khi chạy localhost, server.js (cùng origin) được ưu tiên (xem PROXY_BASE bên dưới).
const CLOUDFLARE_WORKER = 'https://sparkling-flower-9afd.kien2206.workers.dev';

// PROXY_BASE = backend phục vụ /proxy. Ưu tiên:
//   1. Localhost/LAN → server.js cùng origin (nhanh nhất, không qua CF)
//   2. Cloudflare Worker (khi deploy GitHub Pages)
//   3. null → fallback xuống public proxy chain
const PROXY_BASE = (() => {
  if (typeof location !== 'undefined' &&
      /^(localhost|127\.|192\.168\.|10\.|0\.0\.0\.0)/.test(location.hostname)) {
    return location.origin;
  }
  if (CLOUDFLARE_WORKER) return CLOUDFLARE_WORKER.replace(/\/+$/, '');
  return null;
})();
const LOCAL_PROXY = PROXY_BASE ? PROXY_BASE + '/proxy?url=' : null;
const PUBLIC_PROXIES = [
  { name: 'allorigins', build: url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url) },
  { name: 'corsproxy.io', build: url => 'https://corsproxy.io/?' + encodeURIComponent(url) },
  { name: 'codetabs', build: url => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url) },
  { name: 'thingproxy', build: url => 'https://thingproxy.freeboard.io/fetch/' + url },
];
// Các tên miền mirror của truyenfull (cùng IP, cùng kho truyện, cùng HTML).
// Khi domain chính fail toàn bộ proxy chain → fetchPage thử lần lượt các mirror này.
// Hiện tại chỉ truyenfull.vision sống ổn định; còn lại để sẵn cho khi server bật trở lại.
const MIRROR_HOSTS = [
  'truyenfull.io',
  'truyenfull.vn',
  'truyenfull.so',
  'truyenfull.world',
];
const PAGE_SIZE = 60; // chapters per page in list

// ========== STATE ==========
const state = {
  view: 'home', // home | search | detail | reader
  query: '',
  searchResults: [],
  story: null, // { slug, title, author, cover, desc, genres, chapters }
  chapterPage: 1,
  chapter: null, // { url, title, html, prevUrl, nextUrl, slug }
  loading: false,
  error: null,
  errorKind: null, // 'site' = truyenfull đổi cấu trúc | 'network' = lỗi mạng/proxy
  pendingStoryUrl: '',   // url để nút "Thử lại" gọi lại openStory sau khi thất bại
  pendingChapterUrl: '', // url để nút "Thử lại" gọi lại openChapter sau khi thất bại
  settings: loadSettings(),
};

// ========== SETTINGS ==========
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('kien_ne_settings') || '{}');
    return Object.assign({
      fontSize: 18,
      fontFamily: 'serif',
      theme: 'dark',
      contentWidth: 720,
      ttsRate: 1.0,
      ttsAutoNext: true,           // tự chuyển + đọc tiếp chương sau khi hết
      ttsVoice: '',                // tên giọng đọc do user chọn; rỗng = auto (ưu tiên VI)
    }, s);
  } catch { return { fontSize: 18, fontFamily: 'serif', theme: 'dark', contentWidth: 720, ttsRate: 1.0, ttsAutoNext: true, ttsVoice: '' }; }
}
function saveSettings() {
  localStorage.setItem('kien_ne_settings', JSON.stringify(state.settings));
  applySettings();
}

// Set state.error + errorKind từ exception đã bắt. Phân biệt 'site' (cấu trúc nguồn
// đổi → SiteStructureError) vs 'network' (mạng/proxy). Dùng cho catch trong action.
function setActionError(e) {
  state.error = e.message;
  state.errorKind = e.isSiteChange ? 'site' : 'network';
}
function applySettings() {
  const root = document.documentElement;
  root.style.setProperty('--reader-font-size', state.settings.fontSize + 'px');
  root.style.setProperty('--content-width', state.settings.contentWidth + 'px');
  const fontMap = {
    serif: "'Crimson Pro', Georgia, serif",
    sans: "'Be Vietnam Pro', -apple-system, sans-serif",
    mono: "'Courier New', monospace",
  };
  root.style.setProperty('--reader-font-family', fontMap[state.settings.fontFamily] || fontMap.serif);
  // Palette đầy đủ cho TOÀN APP (không chỉ vùng đọc). Mỗi theme override mọi
  // biến màu gốc → home/search/detail/reader đều đổi theo.
  const themeMap = {
    dark: {
      '--bg': '#0f0e0c', '--bg-elev': '#1a1815', '--bg-elev-2': '#25221d',
      '--text': '#e8e0d0', '--text-muted': '#9a9082', '--text-dim': '#6e655a',
      '--accent': '#c8965a', '--accent-hover': '#d9a76b',
      '--border': '#2c2823', '--danger': '#d97757',
      '--header-bg': 'rgba(15,14,12,0.92)',
      '--reader-bg': '#0f0e0c', '--reader-text': '#e8e0d0',
    },
    light: {
      '--bg': '#ffffff', '--bg-elev': '#f5f3ef', '--bg-elev-2': '#ebe7df',
      '--text': '#1f1b16', '--text-muted': '#5c554a', '--text-dim': '#8a8175',
      '--accent': '#b06f2c', '--accent-hover': '#9a5f25',
      '--border': '#ddd8cf', '--danger': '#c0492b',
      '--header-bg': 'rgba(255,255,255,0.92)',

      '--bg': '#f4ecd8', '--bg-elev': '#ece2c8', '--bg-elev-2': '#e3d7b8',
      '--text': '#3a2d1f', '--text-muted': '#6b5a44', '--text-dim': '#8f7c5f',

// Reading progress storage
function getReadingState(slug) {
  try { return JSON.parse(localStorage.getItem('kien_ne_read_' + slug) || 'null'); }
  catch { return null; }
}
function setReadingState(slug, data) {
  const prev = getReadingState(slug) || { read: [] };
  const merged = Object.assign(prev, data);
  if (data.chapterUrl && !merged.read.includes(data.chapterUrl)) {
    merged.read.push(data.chapterUrl);
  }
  localStorage.setItem('kien_ne_read_' + slug, JSON.stringify(merged));
}

// ========== FETCH ==========
async function tryFetch(proxyUrl, label) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 15000);
  try {
    const res = await fetch(proxyUrl, { signal: ctrl.signal });
    clearTimeout(timer);
    if (!res.ok) throw new Error(label + ' HTTP ' + res.status);
    const ct = res.headers.get('content-type') || '';
    let html;
    if (ct.includes('application/json')) {
      const data = await res.json();
      html = data.contents || data.body || '';
    } else {
      html = await res.text();
    }
    if (!html || html.length < 200) throw new Error(label + ' trả nội dung rỗng');
    return html;
  } finally {
    clearTimeout(timer);
  }
}

// Đổi hostname trong URL sang `newHost`, giữ nguyên path/query. Trả '' nếu URL hỏng.
function swapHost(url, newHost) {
  try { const u = new URL(url); u.hostname = newHost; return u.toString(); }
  catch (_) { return ''; }
}

// Thử URL với toàn bộ chuỗi proxy (local + public). Throw nếu tất cả fail.
async function _fetchPageOnce(url) {
  const errors = [];
  if (LOCAL_PROXY) {
    try {
      const html = await tryFetch(LOCAL_PROXY + encodeURIComponent(url), 'local');
      return new DOMParser().parseFromString(html, 'text/html');
    } catch (e) { errors.push('local: ' + e.message); console.warn('Local proxy fail:', e.message); }
  }
  for (const p of PUBLIC_PROXIES) {
    try {
      const html = await tryFetch(p.build(url), p.name);
      return new DOMParser().parseFromString(html, 'text/html');
    } catch (e) { errors.push(p.name + ': ' + e.message); console.warn(p.name + ' fail:', e.message); }
  }
  throw new Error(
    LOCAL_PROXY
      ? 'Không thể tải qua local proxy. Kiểm tra server.js đang chạy và mạng còn hoạt động.\n(' + errors.join(' | ') + ')'
      : 'Tất cả proxy đều thất bại. Hãy chạy server.js (node server.js) rồi mở http://localhost:5173/kien-ne.html để dùng local proxy.\n(' + errors.join(' | ') + ')'
  );
}

async function fetchPage(url) {
  try {
    return await _fetchPageOnce(url);
  } catch (firstErr) {
    // Mirror fallback: domain chính chết toàn diện → thử lần lượt từng mirror.
    // Vì các mirror cùng host structure, chỉ cần đổi hostname.
    for (const host of MIRROR_HOSTS) {
      const alt = swapHost(url, host);
      if (!alt || alt === url) continue;
      try {
        const doc = await _fetchPageOnce(alt);
        console.warn('[fetchPage] mirror "' + host + '" thay cho ' + url);
        return doc;
      } catch (_) { /* mirror cũng chết, thử mirror kế */ }
    }
    throw firstErr;
  }
}

// ========== HELPERS ==========
function pickEl(doc, ...selectors) {
  for (const s of selectors) {
    const el = doc.querySelector(s);
    if (el) return el;
  }
  return null;
}
function pickAll(doc, ...selectors) {
  for (const s of selectors) {
    const els = doc.querySelectorAll(s);
    if (els.length) return Array.from(els);
  }
  return [];
}
function txt(el) { return el ? el.textContent.trim() : ''; }
function attr(el, name) { return el ? el.getAttribute(name) : ''; }

function absoluteUrl(href) {
  if (!href) return '';
  if (href.startsWith('http')) return href;
  if (href.startsWith('//')) return 'https:' + href;
  if (href.startsWith('/')) return BASE + href;
  return BASE + '/' + href;
}

// Trích slug truyện từ URL. Source-agnostic — xử lý:
//   - truyenfull   /<slug>/...          → <slug>
//   - truyenhoan   /<slug>.<id>/...     → <slug>  (bỏ ".<id>" hậu tố)
function slugFromUrl(url) {
  try {
    const u = new URL(url);
    // Lấy segment đầu tiên có nghĩa của path, bỏ hậu tố ".<số>" (truyenhoan).
    const seg = (u.pathname.split('/').filter(Boolean)[0] || '').replace(/\.\d+$/, '');
    return seg || url;
  } catch (_) {
    // Fallback an toàn cho input không phải URL chuẩn
    const m = url.match(/\/([^\/]+)/);
    return m ? m[1] : url;
  }
}

// Bảo đảm URL truyện có dấu "/" ở cuối (cần cho việc ghép `trang-N/`)
function ensureTrailingSlash(url) {
  if (!url) return url;
  const q = url.indexOf('?');
  if (q !== -1) return url; // có query string thì không đụng vào
  return url.endsWith('/') ? url : url + '/';
}

// Chạy `fn` trên từng phần tử của `items` nhưng giới hạn số tác vụ song song.
// Tránh bắn hàng chục request cùng lúc qua proxy công cộng → bị rate-limit/chặn.
async function mapLimit(items, limit, fn) {
  const results = new Array(items.length);
  let idx = 0;
  async function worker() {
    while (idx < items.length) {
      const cur = idx++;
      results[cur] = await fn(items[cur], cur);
    }
  }
  const pool = [];
  for (let i = 0; i < Math.min(limit, items.length); i++) pool.push(worker());
  await Promise.all(pool);
  return results;
}

// ========== SITE-STRUCTURE GUARD ==========
// truyenfull.vision có thể đổi layout/class bất kỳ lúc nào. Khi điều đó xảy ra,
// các selector trong parser sẽ không khớp và app trả về dữ liệu rỗng một cách
// âm thầm. SiteStructureError giúp phân biệt "site đổi cấu trúc" với lỗi mạng,
// để báo cho người dùng biết chính xác là parser cần được cập nhật.
class SiteStructureError extends Error {
  constructor(message, where) {
    super(message);
    this.name = 'SiteStructureError';
    this.where = where || '';   // parser nào phát hiện: search/detail/chapter
    this.isSiteChange = true;
  }
}

// Ném SiteStructureError nếu điều kiện không thỏa — dùng để khẳng định
// một mốc cấu trúc bắt buộc phải tồn tại trong HTML trả về.
function assertStructure(cond, where, detail) {
  if (!cond) {
    throw new SiteStructureError(
      'truyenfull.vision có thể đã thay đổi cấu trúc trang — ' + detail +
      ' Parser cần được cập nhật lại selector.',
      where
    );
  }
}

// Kiểm tra nhanh: tài liệu trả về có "trông giống" trang truyenfull không.
// Nếu proxy trả về trang lỗi/HTML rác thì các mốc này sẽ không tồn tại.
function looksLikeTruyenfullDoc(doc) {
  return !!(
    doc.querySelector('.col-truyen-main, #truyen, .truyen-title, #chapter-c, .chapter-c, #list-chapter') ||
    /truyenfull/i.test(doc.querySelector('title')?.textContent || '')
  );
}

// ========== PARSERS ==========
function parseSearchResults(doc) {
  // Proxy có thể trả về trang lỗi thay vì HTML truyenfull thật.
  assertStructure(looksLikeTruyenfullDoc(doc), 'search',
    'không nhận ra trang truyenfull trong nội dung trả về.');

  const listContainer = pickEl(doc, '.list-truyen', '.col-truyen-main');
  const rows = pickAll(doc,
    '.list-truyen .row',
    '.col-truyen-main .row',
    '.row[itemtype*="Book"]'
  );

  // Có khung danh sách nhưng 0 dòng → thật sự không có kết quả (không phải lỗi).
  // Không có cả khung lẫn dòng → cấu trúc trang tìm kiếm đã đổi.
  assertStructure(listContainer || rows.length, 'search',
    'không tìm thấy khung danh sách kết quả (.list-truyen / .col-truyen-main).');

  const items = [];
  for (const row of rows) {
    const titleA = pickEl(row, 'h3.truyen-title a', '.truyen-title a', 'h3 a');
    if (!titleA) continue;
    const href = absoluteUrl(attr(titleA, 'href'));
    if (!href || href.includes('javascript')) continue;
    let cover = '';
    const book = pickEl(row, '.book img', 'div[data-image]', '.lazyload');
    if (book) {
      cover = attr(book, 'data-image') || attr(book, 'data-src') || attr(book, 'src') || '';
    }
    items.push({
      title: txt(titleA),
      url: href,
      slug: slugFromUrl(href),
      cover: cover,
      author: txt(pickEl(row, '.author', 'span.author')),
      latest: txt(pickEl(row, '.text-info a', '.chapter-text')),
    });
  }

  // Có dòng kết quả nhưng không bóc được item nào → selector tiêu đề đã đổi.
  assertStructure(!(rows.length && items.length === 0), 'search',
    'tìm thấy ' + rows.length + ' dòng kết quả nhưng không đọc được tiêu đề/liên kết truyện.');

  return items;
}

// ========== TRUYENHOAN (truyenfull clone — đọc full trong app) ==========
// HTML structure trùng truyenfull → tái sử dụng parseSearchResults / parseStoryDetail /
// parseChapter mà không cần parser riêng. Chỉ tag source để hiện badge phân biệt.
async function searchTruyenhoan(query) {
  try {
    const url = TRUYENHOAN_BASE + '/tim-kiem/?tukhoa=' + encodeURIComponent(query);
    const doc = await fetchPage(url);
    const items = parseSearchResults(doc);
    return items.map(it => ({ ...it, source: 'truyenhoan' }));
  } catch (e) {
    console.warn('[truyenhoan search] bỏ qua:', e.message);
    return [];                                       // fail không phá search chính
  }
}

function parseStoryDetail(doc, url) {
  assertStructure(looksLikeTruyenfullDoc(doc), 'detail',
    'không nhận ra trang truyenfull trong nội dung trả về.');

  const title = txt(pickEl(doc, 'h3.title', '.title h3', 'h1.title', '[itemprop="name"]'));
  const coverEl = pickEl(doc, '.book img', '.books img', '[itemprop="image"]');
  const cover = attr(coverEl, 'data-image') || attr(coverEl, 'data-src') || attr(coverEl, 'src') || '';
  const authorEl = pickEl(doc, '.info [itemprop="author"]', '.info .author a', '.info a[itemprop="author"]');
  const author = txt(authorEl) || txt(pickEl(doc, '.info a[href*="tac-gia"]'));
  const genres = pickAll(doc, '.info [itemprop="genre"]', '.info .category a', '.info a[href*="the-loai"]').map(txt).filter(Boolean);
  const desc = pickEl(doc, '#tab-description .desc-text', '.desc-text', '[itemprop="description"]');
  const descHtml = desc ? desc.innerHTML : '';
  const status = txt(pickEl(doc, '.info .text-success', '.info span.label-success', '.info span.text-success'));

  // Chapters
  const chapterEls = pickAll(doc,
    '#list-chapter .row ul li a',
    '#list-chapter ul li a',
    '.list-chapter li a',
    'ul.list-chapter li a'
  );
  const chapters = chapterEls.map(a => ({
    title: attr(a, 'title') || txt(a),
    url: absoluteUrl(attr(a, 'href')),
  })).filter(c => c.url && !c.url.includes('javascript'));

  // Pagination info (total pages of chapter list)
  let totalPages = 1;
  const pageLinks = pickAll(doc, '#pagination ul li a', '.pagination li a');
  for (const a of pageLinks) {
    const t = txt(a);
    const n = parseInt(t, 10);
    if (!isNaN(n) && n > totalPages) totalPages = n;
    const href = attr(a, 'href') || '';
    const m = href.match(/trang-(\d+)/);
    if (m) {
      const p = parseInt(m[1], 10);
      if (p > totalPages) totalPages = p;
    }
  }

  // Mốc bắt buộc: tên truyện và danh sách chương. Thiếu một trong hai nghĩa là
  // selector tương ứng đã không còn khớp với HTML của truyenfull.
  assertStructure(title, 'detail', 'không đọc được tên truyện (h3.title / [itemprop="name"]).');
  if (!chapters.length) {
    // Thêm chẩn đoán cụ thể vào thông báo: URL + tình trạng #list-chapter.
    // Giúp dán lại lỗi cho người sửa parser biết ngay là (a) truyện chưa có chương,
    // (b) selector sai, hay (c) trang nguồn đã đổi cấu trúc thật.
    const lc = doc.getElementById('list-chapter');
    const liCount = lc ? lc.querySelectorAll('li a').length : 0;
    const ulCount = lc ? lc.querySelectorAll('ul.list-chapter').length : 0;
    assertStructure(false, 'detail',
      'truyện "' + title + '" — danh sách chương trống. ' +
      'URL: ' + url + ' | #list-chapter: ' + (lc ? 'có' : 'KHÔNG có') +
      ' | ul.list-chapter bên trong: ' + ulCount +
      ' | <li><a> bên trong: ' + liCount + '.');
  }

  return {
    title,
    cover,
    author,
    genres,
    descHtml,
    status,
    chapters,
    totalChapterPages: totalPages,
    url,
    slug: slugFromUrl(url),
  };
}

function cleanChapterContent(contentEl) {
  if (!contentEl) return '';
  const clone = contentEl.cloneNode(true);

  // Remove ads / junk
  const trash = clone.querySelectorAll(
    'script, style, iframe, ins, .ads, .quangcao, .ad, .ad-mobile, .ad-desktop, ' +
    '[id*="google"], [id*="ads"], [class*="ads"], [class*="advertisement"], ' +
    '[class*="banner"], [id*="banner"], .chapter-nav, .box-comment, ' +
    'a[href*="ads"], a[href*="quangcao"], .text-center button, ' +
    '.adsbygoogle, [data-ad], .alert, .ads-network'
  );
  trash.forEach(el => el.remove());

  // Remove inline event handlers + suspicious attrs
  clone.querySelectorAll('*').forEach(el => {
    [...el.attributes].forEach(a => {
      if (a.name.startsWith('on') || a.name === 'style') el.removeAttribute(a.name);
    });
  });

  // Remove empty divs / wrappers that contained ads
  clone.querySelectorAll('div').forEach(el => {
    if (!el.textContent.trim() && !el.querySelector('img')) el.remove();
  });

  // Fix image src
  clone.querySelectorAll('img').forEach(img => {
    const src = img.getAttribute('data-src') || img.getAttribute('data-original') || img.getAttribute('src');
    if (src) img.setAttribute('src', absoluteUrl(src));
    img.removeAttribute('onerror');
  });

  return clone.innerHTML;
}

function parseChapter(doc, url) {
  assertStructure(looksLikeTruyenfullDoc(doc), 'chapter',
    'không nhận ra trang truyenfull trong nội dung trả về.');

  const title = txt(pickEl(doc,
    '.chapter-title',
    'h2.chapter-title',
    'a.chapter-title',
    '.col-xs-12 h2',
    'h1.title'
  ));
  const contentEl = pickEl(doc,
    '#chapter-c',
    '.chapter-c',
    '[id*="chapter-content"]',
    '[class*="chapter-content"]'
  );
  assertStructure(contentEl, 'chapter',
    'không tìm thấy khối nội dung chương (#chapter-c / .chapter-c).');

  const html = cleanChapterContent(contentEl);

  // Có khối nội dung nhưng rỗng sau khi lọc quảng cáo → có thể site đã đổi
  // cách bọc nội dung, hoặc toàn bộ là quảng cáo. Coi như cấu trúc đã đổi.
  // (Vẫn chấp nhận nếu chương chỉ chứa ảnh.)
  const hasText = html.replace(/<[^>]+>/g, '').trim().length > 20;
  assertStructure(hasText || /<img/i.test(html), 'chapter',
    'khối nội dung chương trống sau khi lọc.');

  const prevEl = pickEl(doc, '#prev_chap', 'a#prev_chap', '.truyen-title a[rel="prev"]', 'a[rel="prev"]');
  const nextEl = pickEl(doc, '#next_chap', 'a#next_chap', '.truyen-title a[rel="next"]', 'a[rel="next"]');
  const prevUrl = prevEl ? absoluteUrl(attr(prevEl, 'href')) : '';
  const nextUrl = nextEl ? absoluteUrl(attr(nextEl, 'href')) : '';
  const validPrev = prevUrl && !prevUrl.includes('javascript') && !prevEl.classList.contains('disabled');
  const validNext = nextUrl && !nextUrl.includes('javascript') && !nextEl.classList.contains('disabled');

  // Find story slug from breadcrumb or chapter URL
  const storyLink = pickEl(doc, '.truyen-title a[href*="truyenfull"]', 'h2.truyen-title a', '.chapter h2 a');
  const storyUrl = storyLink ? absoluteUrl(attr(storyLink, 'href')) : '';
  const storyTitle = txt(storyLink);
  const slug = slugFromUrl(url).replace(/-chuong.*$/, '');

  return {
    title,
    html,
    prevUrl: validPrev ? prevUrl : '',
    nextUrl: validNext ? nextUrl : '',
    url,
    storyUrl,
    storyTitle,
    slug,
  };
}

// ========== ACTIONS ==========
// Generation token: nếu người dùng search query mới trước khi nguồn cũ trả về,
// các response cũ sẽ bị bỏ — tránh "kết quả ma" của lần search trước.
let _searchGen = 0;

// In-memory LRU cache: query lặp lại trong 5 phút → render TỨC THÌ (0ms), không gọi mạng.
// Hữu ích khi người dùng quay lại / back / gõ lại từ khoá vừa tìm.
const _searchCacheMap = new Map();
const SEARCH_CACHE_TTL = 5 * 60 * 1000;
const SEARCH_CACHE_MAX = 20;
function cachedSearch(query) {
  const e = _searchCacheMap.get(query);
  if (!e) return null;
  if (Date.now() - e.ts > SEARCH_CACHE_TTL) { _searchCacheMap.delete(query); return null; }
  _searchCacheMap.delete(query); _searchCacheMap.set(query, e);   // bump LRU
  return e.results;
}
function setSearchCache(query, results) {
  if (_searchCacheMap.size >= SEARCH_CACHE_MAX) {
    _searchCacheMap.delete(_searchCacheMap.keys().next().value);
  }
  _searchCacheMap.set(query, { results, ts: Date.now() });
}

async function doSearch(query) {
  const gen = ++_searchGen;
  state.view = 'search';
  state.query = query;
  state.error = null;
  state.errorKind = null;

  // CACHE HIT: render tức thì, không gọi mạng
  const cached = cachedSearch(query);
  if (cached && cached.length) {
    state.searchResults = [...cached];
    state.searchSources = { tf: 'cached', th: 'cached' };
    state.loading = false;
    render();
    return;
  }

  state.loading = true;
  state.searchResults = [];
  state.searchSources = { tf: 'loading', th: 'loading' };
  render();

  // Progressive render: mỗi nguồn xong là render ngay (truyenfull ~1s, truyenhoan ~1-2s).
  let tfErr = null;
  let pending = 2;
  function appendResults(items, sourceKey, status) {
    if (gen !== _searchGen) return;                  // user đã search query khác
    if (items && items.length) state.searchResults = [...state.searchResults, ...items];
    state.searchSources[sourceKey] = status;
    pending--;
    if (pending === 0) {
      state.loading = false;
      if (state.searchResults.length === 0 && tfErr) {
        setActionError(tfErr);
      } else if (state.searchResults.length) {
        setSearchCache(query, state.searchResults);
      }
    }
    render();
  }

  // Bắn 2 nguồn song song, không await ở scope ngoài
  (async () => {
    try {
      const doc = await fetchPage(`${BASE}/tim-kiem/?tukhoa=${encodeURIComponent(query)}`);
      appendResults(parseSearchResults(doc), 'tf', 'done');
    } catch (e) { tfErr = e; appendResults([], 'tf', 'fail'); }
  })();
  (async () => {
    const r = await searchTruyenhoan(query);
    appendResults(r, 'th', r.length ? 'done' : 'fail');
  })();
}

async function openStory(url) {
  state.view = 'detail';
  state.loading = true;
  state.error = null;
  state.story = null;
  state.chapterPage = 1;
  state.pendingStoryUrl = url;
  render();
  window.scrollTo(0, 0);
  try {
    const doc = await fetchPage(url);
    const story = parseStoryDetail(doc, url);

    // RENDER NGAY sau trang 1 — người dùng thấy trang chi tiết + 50 chương đầu
    // trong ~1s thay vì chờ tải hết các trang phân trang (có thể mất 5-10s).
    state.story = story;
    state.loading = false;
    render();

    // Các trang chương còn lại được tải NỀN — bổ sung vào story.chapters,
    // re-render khi xong để hiện đủ tổng số chương + phân trang đầy đủ.
    if (story.totalChapterPages > 1) loadMoreChaptersInBackground(story, url);
    return;
  } catch (e) {
    setActionError(e);
  }
  state.loading = false;
  render();
}

// Tải các trang phân trang chương còn lại sau khi đã render trang chi tiết.
// Chạy không chặn UI; bail sớm nếu người dùng đã chuyển sang truyện khác.
async function loadMoreChaptersInBackground(story, url) {
  const baseUrl = ensureTrailingSlash(url);
  const maxPages = Math.min(story.totalChapterPages, 50);
  const pageNums = [];
  for (let p = 2; p <= maxPages; p++) pageNums.push(p);

  const seen = new Set(story.chapters.map(c => c.url));
  await mapLimit(pageNums, 5, async (p) => {
    if (state.story !== story) return;                 // user navigated away
    let d;
    try { d = await fetchPage(`${baseUrl}trang-${p}/`); }
    catch (_) { return; }                              // bỏ qua trang fail
    if (state.story !== story) return;
    const more = pickAll(d,
      '#list-chapter .row ul li a',
      '#list-chapter ul li a',
      '.list-chapter li a'
    ).map(a => ({
      title: attr(a, 'title') || txt(a),
      url: absoluteUrl(attr(a, 'href')),
    })).filter(c => c.url && !c.url.includes('javascript'));
    for (const ch of more) {
      if (!seen.has(ch.url)) { seen.add(ch.url); story.chapters.push(ch); }
    }
  });

  // Re-render 1 lần ở cuối (tránh re-render 49 lần làm giật). Chỉ render nếu
  // người dùng vẫn đang ở trang chi tiết của truyện này.
  if (state.view === 'detail' && state.story === story) {
    // Giữ vị trí cuộn hiện tại — re-render trong cùng view không tự khôi phục
    // scroll, nếu để mặc định người đọc sẽ bị nhảy về đầu trang giữa chừng.
    const savedScroll = window.scrollY;
    render();
    requestAnimationFrame(() => window.scrollTo({ top: savedScroll, behavior: 'auto' }));
  }
}

async function openChapter(url, storyContext) {
  // Nếu đang auto-advance từ TTS, dùng _softStop để KHÔNG xoá cờ _autoResumeAfterLoad
  // (cờ này cần giữ lại để cuối hàm gọi _tts.start() đọc tiếp).
  if (_tts._autoResumeAfterLoad) _tts._softStop();
  else _tts.stop();
  state.view = 'reader';
  state.loading = true;
  state.error = null;
  state.chapter = null;
  state.pendingChapterUrl = url;
  render();
  window.scrollTo(0, 0);
  try {
    // Cache hierarchy: L1 localStorage (sync) → L2 IndexedDB (persistent offline) → network.
    // Fetch/parse chỉ chạy khi cache miss.
    let ch = loadChapterCache(url);
    let cameFromCache = !!ch;
    if (!ch) {
      ch = await idbGetChapter(url);
      cameFromCache = !!ch;
    }
    if (!ch) {
      const doc = await fetchPage(url);
      ch = parseChapter(doc, url);
    }
    if (storyContext) {
      ch.storyTitle = ch.storyTitle || storyContext.title;
      ch.slug = storyContext.slug || ch.slug;
      ch.storyUrl = ch.storyUrl || storyContext.url;
    }
    // Bảo đảm chương ĐANG đọc luôn nằm trong CẢ hai tầng cache:
    // L1 (mở lại tức thì) và L2 (đọc offline). Kể cả khi nó vốn chỉ nằm ở
    // một tầng — vd: còn trong L1 từ phiên cũ mà chưa kịp ghi vào IndexedDB.
    saveChapterCache(url, ch);   // L1 — đồng thời đưa lên đầu LRU
    idbPutChapter(url, ch);      // L2 — fire-and-forget, không chặn UI
    ch._fromCache = cameFromCache;
    state.chapter = ch;
    setReadingState(ch.slug, { chapterUrl: url, chapterTitle: ch.title });
    saveReadingProgress(ch.slug, {
      storyTitle: ch.storyTitle,
      storyUrl: ch.storyUrl,
      chapterUrl: url,
      chapterTitle: ch.title,
      cover: (storyContext && storyContext.cover) || (state.story && state.story.cover) || '',
    });
  } catch (e) {
    setActionError(e);
  }
  state.loading = false;
  render();
  restoreScrollPosition();

  // Tải ngầm ~20 chương kế tiếp vào IndexedDB — lần đọc sau khỏi cần mạng.
  if (state.chapter && !state.error) schedulePrefetchAfter(state.chapter.url);

  // Auto-advance TTS: chương trước hết → đã openChapter(nextUrl) với cờ này → đọc tiếp.
  if (state.chapter && !state.error && _tts._autoResumeAfterLoad) {
    _tts._autoResumeAfterLoad = false;
    _tts.start();              // user-gesture đã unlock từ ▶ ban đầu, ko cần gesture mới
  }
}

function goHome() {
  _tts.stop();
  state.view = 'home';
  state.query = '';
  state.searchResults = [];
  state.error = null;
  render();
  window.scrollTo(0, 0);
}

function backToStory() {
  _tts.stop();
  if (state.story) {
    state.view = 'detail';
    state.error = null;
    render();
    window.scrollTo(0, 0);
  } else if (state.chapter && state.chapter.storyUrl) {
    openStory(state.chapter.storyUrl);
  } else {
    goHome();
  }
}

// ========== TEXT-TO-SPEECH (Web Speech API) ==========
// Đọc to nội dung chương qua giọng tích hợp trình duyệt. Miễn phí, không cần key.
// Trạng thái: 'idle' → click play → 'playing' → click → 'paused' → click → 'playing' …
// Auto stop khi rời reader (chuyển chương / quay lại trang chi tiết / về home).
// Chrome bug-workaround: voices nạp bất đồng bộ — getVoices() trả [] lần đầu.
// Đợi voiceschanged hoặc timeout 1500ms rồi tiếp.
function _ttsGetVoicesAsync() {
  return new Promise((resolve) => {
    const synth = window.speechSynthesis;
    let v = synth.getVoices() || [];
    if (v.length) return resolve(v);
    const done = () => { resolve(synth.getVoices() || []); };
    if ('onvoiceschanged' in synth) {
      const h = () => { synth.removeEventListener('voiceschanged', h); done(); };
      synth.addEventListener('voiceschanged', h);
    }
    setTimeout(done, 1500);                              // fallback nếu sự kiện không bao giờ fire
  });
}

const _tts = {
  state: 'idle',
  chunks: [],
  idx: 0,
  voice: null,                 // chọn 1 lần ở start(), tái dùng — tránh getVoices() lặp
  _watchdog: null,             // timer cứu khi onend của Chrome không fire

  // Chia .reader-content thành mảng { text, el }.
  // Truyenfull/truyenhoan đôi khi dùng <br> thay vì <p> → fallback innerText.
  // Đoạn dài được CHẺ NHỎ ≤ ~180 ký tự tại ranh giới câu: utterance ngắn → onend
  // fire ổn định (Chrome hay nuốt onend với utterance > ~15s).
  _buildChunks() {
    const root = document.querySelector('.reader-content');
    if (!root) return [];
    const raw = [];

    for (const p of root.querySelectorAll('p')) {
      const t = (p.textContent || '').trim();
      if (t) raw.push({ text: t, el: p });
    }
    if (!raw.length) {
      const text = (root.innerText || root.textContent || '').trim();
      if (!text) return [];
      text.split(/\n+/).map(s => s.trim()).filter(s => s.length > 1)
        .forEach(t => raw.push({ text: t, el: root }));
    }

    const MAX = 180;
    const out = [];
    for (const c of raw) {
      if (c.text.length <= MAX) { out.push(c); continue; }
      const parts = c.text.match(/[^.!?…]+[.!?…]+|\s*[^.!?…]+$/g) || [c.text];
      let buf = '';
      for (const part of parts) {
        if ((buf + part).length > MAX && buf) { out.push({ text: buf.trim(), el: c.el }); buf = part; }
        else buf += part;
      }
      if (buf.trim()) out.push({ text: buf.trim(), el: c.el });
    }
    return out;
  },

  // Chrome cancel-then-speak race: gọi cancel() rồi speak() ngay → silent fail.
  // Giải pháp: tách bằng setTimeout 50ms.
  _resetSynth() {
    try { window.speechSynthesis.cancel(); } catch (_) {}
  },

  _speakIdx() {
    if (this.state !== 'playing') return;
    if (this.idx >= this.chunks.length) { this._finishChapter(); return; }
    const ch = this.chunks[this.idx];
    const u = new SpeechSynthesisUtterance(ch.text);
    u.lang = 'vi-VN';
    const rate = (state.settings && state.settings.ttsRate) || 1.0;
    u.rate = rate;
    if (this.voice) u.voice = this.voice;

    const canHighlight = ch.el && ch.el.tagName === 'P';

    // Tiến sang đoạn kế. Gọi từ onend HOẶC watchdog — `done` chống chạy 2 lần.
    let done = false;
    const advance = () => {
      if (done || this.state !== 'playing') return;
      done = true;
      clearTimeout(this._watchdog);
      if (canHighlight) ch.el.classList.remove('tts-highlight');
      this.idx++;
      this._speakIdx();
    };
    u.onend = advance;
    u.onerror = (e) => {
      console.warn('[tts] utterance error:', e && (e.error || e.message));
      advance();
    };

    if (canHighlight) {
      ch.el.classList.add('tts-highlight');
      const r = ch.el.getBoundingClientRect();
      if (r.top < 80 || r.bottom > window.innerHeight - 80) {
        ch.el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    }

    // WATCHDOG: Chrome thường KHÔNG fire onend cho utterance cuối / sau pause.
    // Nếu quá thời lượng ước tính mà chưa onend → tự tiến (đảm bảo auto-next chạy).
    // Ước lượng ~13 ký tự/giây ở rate 1.0, +4s buffer.
    const estMs = (ch.text.length / (13 * rate)) * 1000 + 4000;
    clearTimeout(this._watchdog);
    this._watchdog = setTimeout(() => {
      if (this.state === 'playing' && !done) {
        console.warn('[tts] watchdog: onend không fire → tự tiến đoạn kế');
        try { window.speechSynthesis.cancel(); } catch (_) {}
        advance();
      }
    }, estMs);

    try { window.speechSynthesis.speak(u); }
    catch (e) { console.error('[tts] speak() throw:', e); this.stop(); }
  },

  // QUAN TRỌNG: start() phải đồng bộ (không await/setTimeout trước speak()) — iOS
  // Safari/Chrome bỏ user-gesture nếu có await giữa click và speak() → silent fail.
  start() {
    if (!('speechSynthesis' in window) || typeof SpeechSynthesisUtterance === 'undefined') {
      alert('Trình duyệt không hỗ trợ đọc to (Web Speech API).');
      return;
    }
    if (this.state === 'paused') { this.resume(); return; }

    this.chunks = this._buildChunks();
    if (!this.chunks.length) { alert('Không có đoạn văn để đọc.'); return; }

    // Voice phải lấy ĐỒNG BỘ ngay đây (cache từ _ttsPreload chạy lúc boot).
    const voices = (this._voicesCache && this._voicesCache.length)
      ? this._voicesCache
      : (window.speechSynthesis.getVoices() || []);
    if (voices.length) this._voicesCache = voices;
    this.voice = this._resolveVoice(voices);
    console.log('[tts] có', voices.length, 'giọng;',
      this.voice ? 'dùng giọng: ' + this.voice.name + ' (' + this.voice.lang + ')' : 'không set voice → browser default theo lang');

    // KHÔNG cancel() nếu synth đang yên — cancel() trước speak() trên iOS gây silent fail.
    if (window.speechSynthesis.speaking || window.speechSynthesis.pending) {
      try { window.speechSynthesis.cancel(); } catch (_) {}
    }

    this.idx = 0;
    this.state = 'playing';
    this._renderBtn();
    // Gọi speak() ĐỒNG BỘ ngay đây — gesture chain còn nguyên
    this._speakIdx();
  },

  pause() {
    if (this.state !== 'playing') return;
    window.speechSynthesis.pause();
    this.state = 'paused';
    this._renderBtn();
  },

  resume() {
    if (this.state !== 'paused') return;
    window.speechSynthesis.resume();
    this.state = 'playing';
    this._renderBtn();
  },

  // Dọn synth + DOM, KHÔNG đụng flag _autoResumeAfterLoad (cho phép auto-advance tiếp).
  _softStop() {
    clearTimeout(this._watchdog);
    try { window.speechSynthesis.cancel(); } catch (_) {}
    document.querySelectorAll('.tts-highlight').forEach(el => el.classList.remove('tts-highlight'));
    this.state = 'idle';
    this.chunks = [];
    this.idx = 0;
    this._renderBtn();
  },

  // Dừng do user (click nút, navigate) — huỷ luôn auto-resume nếu có.
  stop() {
    this._softStop();
    this._autoResumeAfterLoad = false;
  },

  // Hết chương — nếu user bật auto-next + có nextUrl → mở chương sau & tự đọc tiếp.
  _finishChapter() {
    const ch = state.chapter;
    const autoNext = !state.settings || state.settings.ttsAutoNext !== false;   // mặc định bật
    if (autoNext && ch && ch.nextUrl) {
      this._autoResumeAfterLoad = true;            // openChapter sẽ thấy cờ → softStop + resume sau load
      const ctx = state.story ? {
        title: state.story.title, slug: state.story.slug,
        url: state.story.url,    cover: state.story.cover,
      } : null;
      openChapter(ch.nextUrl, ctx);
    } else {
      this.stop();                                  // hết truyện (no nextUrl) hoặc auto-next tắt
    }
  },

  toggle() {
    if (this.state === 'idle') this.start();
    else if (this.state === 'playing') this.pause();
    else this.resume();
  },

  // Chọn voice theo ưu tiên: (1) user pick từ Settings → (2) bất kỳ vi-VN/Vietnam → (3) null.
  // null nghĩa "để browser tự chọn theo u.lang" — tốt hơn set bừa.
  _resolveVoice(voices) {
    if (!voices || !voices.length) return null;
    const want = state.settings && state.settings.ttsVoice;
    if (want) {
      const picked = voices.find(v => v.name === want);
      if (picked) return picked;
      // Voice user chọn không còn (đổi máy / browser) → fallback
    }
    return voices.find(v => /^vi[-_]/i.test(v.lang)) ||
           voices.find(v => /Vietnam/i.test(v.name)) ||
           null;
  },

  // Áp rate/voice mới NGAY vào đoạn đang đọc — restart utterance hiện tại.
  // SpeechSynthesisUtterance không cho đổi rate/voice giữa chừng → phải cancel + speak lại.
  applyRateLive() {
    this._renderRateBtn();
    // Re-resolve voice (user có thể vừa đổi voice trong Settings)
    if (this._voicesCache && this._voicesCache.length) {
      this.voice = this._resolveVoice(this._voicesCache);
    }
    if (this.state !== 'playing' && this.state !== 'paused') return;
    const wasPaused = this.state === 'paused';
    try { window.speechSynthesis.cancel(); } catch (_) {}
    this.state = 'playing';
    this._speakIdx();                              // đọc lại đoạn hiện tại với rate/voice mới
    if (wasPaused) setTimeout(() => this.pause(), 80);
  },

  _renderRateBtn() {
    const btn = document.getElementById('tts-rate-btn');
    if (!btn) return;
    const r = (state.settings && state.settings.ttsRate) || 1.0;
    btn.textContent = r.toFixed(2).replace(/\.?0+$/, '') + '×';
  },

  _renderBtn() {
    const btn = document.getElementById('tts-btn');
    if (!btn) return;
    if (this.state === 'playing') {
      btn.innerHTML = icon.pause;
      btn.classList.add('tts-active');
      btn.setAttribute('title', 'Tạm dừng đọc');
    } else if (this.state === 'paused') {
      btn.innerHTML = icon.play;
      btn.classList.add('tts-active');
      btn.setAttribute('title', 'Tiếp tục đọc');
    } else {
      btn.innerHTML = icon.play;
      btn.classList.remove('tts-active');
      btn.setAttribute('title', 'Đọc to');
    }
  },
};
function toggleTts() { _tts.toggle(); }

// Preset tốc độ TTS — cycle qua từng bước khi click nút "×rate" trong toolbar.
const TTS_RATE_PRESETS = [0.75, 1.0, 1.25, 1.5, 1.75, 2.0];
function cycleTtsRate() {
  const cur = (state.settings && state.settings.ttsRate) || 1.0;
  // Tìm preset gần nhất rồi chuyển sang preset kế. Wrap quanh.
  let i = TTS_RATE_PRESETS.findIndex(r => Math.abs(r - cur) < 0.05);
  if (i < 0) i = TTS_RATE_PRESETS.findIndex(r => r >= cur);   // tốc độ tuỳ chỉnh từ slider
  if (i < 0) i = TTS_RATE_PRESETS.length - 1;
  const next = TTS_RATE_PRESETS[(i + 1) % TTS_RATE_PRESETS.length];
  updateSetting('ttsRate', next);                            // saveSettings + applySettings
  _tts.applyRateLive();                                       // áp ngay vào đoạn đang đọc
}

function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  })[c]);
}
// JSON value safe for use inside single-quoted HTML attribute
function jsAttr(value) {
  return JSON.stringify(value).replace(/&/g, '&amp;').replace(/'/g, '&#39;').replace(/</g, '&lt;');
}

function renderHeader() {
  const showBack = state.view !== 'home';
  return `
    <div class="header-inner">
      ${showBack
        ? `<button class="back-btn" onclick="handleBack()" aria-label="Quay lại">${icon.back}</button>`
        : ''}
      <div class="logo" onclick="goHome()">KIEN<span class="logo-dot"> NE</span></div>
      <form class="search-bar" onsubmit="event.preventDefault(); handleSearch(event.target.q.value);">
        ${icon.search}
        <input name="q" type="text" placeholder="Tìm tên truyện…" value="${escapeHtml(state.query)}" autocomplete="off" oninput="handleSearchInput(this.value)">
      </form>
    </div>
  `;
}

  'Xuyên Không', 'Hài Hước', 'Trọng Sinh'
];

function slugToTitle(slug) {
  return slug.replace(/-/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
}

function getRecentReads(limit = 12) {
  const items = [];
  try {
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (!key || !key.startsWith('kien_ne_read_')) continue;
      const slug = key.slice('kien_ne_read_'.length);
      const data = JSON.parse(localStorage.getItem(key) || '{}');
      if (!data.chapterUrl) continue;
      items.push({ slug, chapterUrl: data.chapterUrl, chapterTitle: data.chapterTitle || '' });
    }
  } catch {}
  // LocalStorage preserves insertion order; most recent at end. Reverse to show newest first.
  return items.reverse().slice(0, limit);
}

  const historySection = history.length ? `
    <div class="home-section">

function renderSearch() {
  // Progressive: nếu đang load NHƯNG đã có kết quả → hiện danh sách + thanh "đang tải nguồn khác"
  if (state.loading && !state.searchResults.length) return renderSearchSkeleton();
  if (state.error) return renderError(state.error, () => doSearch(state.query));
  if (!state.searchResults.length) {

function renderStoryDetail() {
  if (state.loading) return renderLoader('Đang tải thông tin truyện…');

  const s = state.story;

  const totalChapters = s.chapters.length;

  return `

    ${s.chapters.length ? `
      <div class="story-cta-bar">

        ${lastReadUrl ? `<button class="cta-btn secondary" onclick='openChapter(${jsAttr(lastReadUrl)}, ${jsAttr({title:s.title,slug:s.slug,url:s.url,cover:s.cover})})'>Tiếp tục</button>` : ''}

      <h2 class="section-title" style="margin:0">Danh sách chương</h2>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
        ${s.chapters.length ? `<button id="prefetch-btn" class="prefetch-btn" onclick="prefetchFromDetail()" title="Tải trước ${PREFETCH_COUNT} chương vào máy để đọc khi mất mạng">⤓ Tải trước ${PREFETCH_COUNT} chương</button>` : ''}
        ${s.chapters.length ? `<form class="chapter-jump" onsubmit="event.preventDefault(); jumpToChapter(this.n.value)" title="Nhập số chương rồi Enter để đọc ngay">
          <span>Đến #</span>
          <input type="number" name="n" min="1" max="${totalChapters}" placeholder="${totalChapters}" inputmode="numeric" autocomplete="off">

        </form>` : ''}

      </div>
    </div>
    <div class="chapters-list">
      ${pageChapters.length ? pageChapters.map(ch => {
        const isRead = readSet.has(ch.url);
        const isCurrent = ch.url === lastReadUrl;
        const cls = ['chapter-item'];
        if (isRead) cls.push('read');
        if (isCurrent) cls.push('current');
        return `<a class="${cls.join(' ')}" onclick='openChapter(${jsAttr(ch.url)}, ${jsAttr({title:s.title,slug:s.slug,url:s.url,cover:s.cover})})' title="${escapeHtml(ch.title)}">${escapeHtml(ch.title)}</a>`;
      }).join('') : '<div style="padding:20px;color:var(--text-muted);text-align:center">Chưa có chương nào</div>'}
    </div>
    ${totalPages > 1 ? renderPagination(curPage, totalPages) : ''}
  `;
}

function renderPagination(cur, total) {
  const btns = [];
  btns.push(`<button class="page-btn" onclick="setChapterPage(${cur - 1})" ${cur === 1 ? 'disabled' : ''}>‹</button>`);

  const pages = new Set([1, total, cur, cur - 1, cur + 1, cur - 2, cur + 2]);
  const list = [...pages].filter(p => p >= 1 && p <= total).sort((a, b) => a - b);
  let prev = 0;
  for (const p of list) {
    if (p - prev > 1) btns.push('<span style="color:var(--text-dim);padding:0 4px">…</span>');
    btns.push(`<button class="page-btn ${p === cur ? 'active' : ''}" onclick="setChapterPage(${p})">${p}</button>`);
    prev = p;
  }
  btns.push(`<button class="page-btn" onclick="setChapterPage(${cur + 1})" ${cur === total ? 'disabled' : ''}>›</button>`);
  return `<div class="pagination">${btns.join('')}</div>`;
}

function setChapterPage(p) {
  state.chapterPage = p;
  render();
  document.querySelector('.chapters-list')?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// Tìm chương theo số thứ tự (1-based) trong danh sách. Pure → dễ test.
// Trả về { chapter, index, pageIndex } hoặc null nếu ngoài phạm vi / dữ liệu trống.
function findChapterByNumber(chapters, n, pageSize) {
  if (!chapters || !chapters.length) return null;
  const num = parseInt(n, 10);
  if (!Number.isFinite(num) || num < 1 || num > chapters.length) return null;
  const idx = num - 1;
  return { chapter: chapters[idx], index: idx, pageIndex: Math.floor(idx / pageSize) + 1 };
}

// Người dùng nhập số chương ở trang chi tiết → mở luôn chương đó.
function jumpToChapter(input) {
  const s = state.story;
  if (!s) return;
  const found = findChapterByNumber(s.chapters, input, PAGE_SIZE);
  if (!found) return;
  openChapter(found.chapter.url, { title: s.title, slug: s.slug, url: s.url, cover: s.cover });
}
